<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | الموسوعة العالمية للطبخ</title>
    <style>
        /* --- التصميم الأصلي المعتمد --- */
        :root {
            --primary: #e67e22; /* برتقالي دافئ للشهية */
            --secondary: #27ae60; /* أخضر للمكونات الطازجة */
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f9f9f9; 
            margin: 0; 
            color: var(--dark);
        }

        header { 
            background: var(--dark); 
            color: white; 
            padding: 3rem 1rem; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 { margin: 0; font-size: 2.5rem; }

        .search-container { 
            margin: -25px auto 20px; 
            display: flex; 
            justify-content: center; 
            max-width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 50px;
            overflow: hidden;
        }

        input { 
            padding: 15px 25px; 
            width: 100%; 
            border: none; 
            outline: none; 
            font-size: 1.1rem;
        }

        .search-btn { 
            padding: 15px 30px; 
            background: var(--primary); 
            border: none; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
        }

        .categories { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin: 20px; 
            flex-wrap: wrap; 
        }

        .cat-btn { 
            padding: 10px 22px; 
            border-radius: 25px; 
            border: 2px solid var(--primary); 
            background: white; 
            color: var(--primary); 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        .cat-btn.active, .cat-btn:hover { 
            background: var(--primary); 
            color: white; 
        }

        .recipe-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            transition: 0.3s; 
        }

        .card:hover { transform: translateY(-8px); }

        .video-container iframe { 
            width: 100%; 
            height: 220px; 
            border: none; 
        }

        .details { padding: 20px; }
        
        .badge { 
            background: var(--secondary); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 12px; 
            display: inline-block;
            margin-bottom: 10px;
        }

        .title { margin: 5px 0; font-size: 1.5rem; color: var(--dark); }
        .timer { color: #7f8c8d; font-size: 14px; margin-bottom: 15px; }

        .section-title { 
            color: var(--primary); 
            font-weight: bold; 
            margin-top: 15px; 
            display: block; 
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        ul, ol { padding-right: 20px; font-size: 0.95rem; line-height: 1.6; color: #444; }

        #noResults { text-align: center; padding: 50px; display: none; font-size: 1.2rem; color: #7f8c8d; }

        @media (max-width: 600px) {
            .recipe-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Cooking-with-TORAYA 🍳</h1>
    <p>وصفات حقيقية من حول العالم بجميع اللغات</p>
</header>

<div class="search-container">
    <input type="text" id="recipeSearch" oninput="runSearch()" placeholder="ابحث بكل اللغات: Pasta, فطور, Tajine, Lunch, عشاء...">
    <button class="search-btn">بحث</button>
</div>

<nav class="categories">
    <button class="cat-btn active" onclick="filterType('all', this)">الكل</button>
    <button class="cat-btn" onclick="filterType('فطور', this)">فطور</button>
    <button class="cat-btn" onclick="filterType('غداء', this)">غداء</button>
    <button class="cat-btn" onclick="filterType('عشاء', this)">عشاء</button>
    <button class="cat-btn" onclick="filterType('حلويات', this)">حلويات</button>
</nav>

<div id="noResults">🔎 لم نجد وصفة بهذا الاسم.. جرب لغة أخرى!</div>

<main id="recipeGrid" class="recipe-grid"></main>

<script>
    // --- قاعدة بيانات الوصفات الكاملة والدقيقة ---
    const recipes = [
        {
            names: ["الكسكس المغربي", "Moroccan Couscous", "Couscous Marocain"],
            searchTags: "كسكس غداء مغربي morocco lunch maghrib",
            type: "غداء",
            time: "120 دقيقة",
            ingredients: ["1 كغ كسكس رفيع", "لحم غنم أو دجاج", "7 خضار (جزر، لفت، قرع، حمص..)", "سمن مغربي وتوابل"],
            steps: ["تحضير المرق مع اللحم والتوابل", "تبخير الكسكس 3 مرات مع رشه بالماء والملح", "إضافة الخضار للمرق تدريجياً", "تقديم الكسكس وتسقيته بالمرق الساخن"],
            video: "https://www.youtube.com/embed/fD3G0j1F9wY"
        },
        {
            names: ["بان كيك هش", "Fluffy Pancakes", "Pancakes Moelleux"],
            searchTags: "بان كيك فطور حلويات breakfast sweet petit déjeuner",
            type: "فطور",
            time: "15 دقيقة",
            ingredients: ["كوب دقيق", "بيضة واحدة", "كوب حليب", "فانيليا، سكر، بكينج باودر"],
            steps: ["خلط السوائل جيداً ثم إضافة الدقيق", "صب الخليط في مقلاة ساخنة", "القلب فور ظهور الفقاعات", "التقديم مع العسل أو الشوكولاتة"],
            video: "https://www.youtube.com/embed/N_p_96K9X8o"
        },
        {
            names: ["باستا إيطالية", "Italian Pasta", "Pâtes Italiennes"],
            searchTags: "باستا غداء عشاء مكرونة pasta dinner lunch italien",
            type: "عشاء",
            time: "25 دقيقة",
            ingredients: ["400غ مكرونة", "صلصة طماطم طازجة", "ثوم، ريحان، زيت زيتون", "جبن بارميزان"],
            steps: ["سلق المكرونة في ماء مملح", "تحضير الصلصة مع الثوم والريحان", "خلط المكرونة بالصلصة", "إضافة الجبن وتقدم ساخنة"],
            video: "https://www.youtube.com/embed/1-SJGQ2HLp8"
        },
        {
            names: ["طاجين الدجاج", "Chicken Tagine", "Tajine de Poulet"],
            searchTags: "طاجين دجاج غداء مغربي chicken tagine morocco lunch",
            type: "غداء",
            time: "60 دقيقة",
            ingredients: ["دجاجة مقطعة", "بصل مفروم وثوم", "زيتون أخضر وحامض مصير", "زعفران وزنجبيل وزيت زيتون"],
            steps: ["تتبيل الدجاج بالتوابل وزيت الزيتون", "طهي البصل والدجاج في الطاجين", "إضافة الزيتون والحامض قبل النضج", "تركه يتجمر حتى يقل المرق"],
            video: "https://www.youtube.com/embed/L1m1e_y5kOQ"
        },
        {
            names: ["تيراميسو", "Tiramisu", "Tiramisù"],
            searchTags: "تيراميسو حلويات حلى ايطالي dessert sweet italian",
            type: "حلويات",
            time: "30 دقيقة",
            ingredients: ["بسكويت ليدي فينجر", "جبن ماسكربون", "قهوة اسبريسو باردة", "بودرة كاكاو"],
            steps: ["خفق الجبن مع الكريمة والسكر", "غمس البسكويت في القهوة سريعة", "عمل طبقات من البسكويت والكريمة", "التبريد في الثلاجة ورش الكاكاو"],
            video: "https://www.youtube.com/embed/mUf_T-3o_6E"
        }
    ];

    function renderRecipes(data) {
        const grid = document.getElementById('recipeGrid');
        const noResults = document.getElementById('noResults');
        
        if (data.length === 0) {
            grid.innerHTML = "";
            noResults.style.display = "block";
            return;
        }

        noResults.style.display = "none";
        grid.innerHTML = data.map(recipe => `
            <div class="card">
                <div class="video-container">
                    <iframe src="${recipe.video}" allowfullscreen></iframe>
                </div>
                <div class="details">
                    <span class="badge">${recipe.type}</span>
                    <h2 class="title">${recipe.names[0]}</h2>
                    <p class="timer">⏱️ مدة الطهي: ${recipe.time}</p>
                    
                    <span class="section-title">المكونات:</span>
                    <ul>${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
                    
                    <span class="section-title">طريقة التحضير بدقة:</span>
                    <ol>${recipe.steps.map(step => `<li>${step}</li>`).join('')}</ol>
                </div>
            </div>
        `).join('');
    }

    function runSearch() {
        const term = document.getElementById('recipeSearch').value.toLowerCase();
        const filtered = recipes.filter(r => 
            r.names.some(name => name.toLowerCase().includes(term)) || 
            r.searchTags.includes(term)
        );
        renderRecipes(filtered);
    }

    function filterType(type, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (type === 'all') {
            renderRecipes(recipes);
        } else {
            const filtered = recipes.filter(r => r.type === type);
            renderRecipes(filtered);
        }
    }

    // التشغيل الأول عند تحميل الصفحة
    window.onload = () => renderRecipes(recipes);
</script>
</body>
</html>
