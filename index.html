<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>وصفات الطبخ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0c10;
      --card-bg: #11131a;
      --accent: #f5b301;
      --accent-soft: rgba(245, 179, 1, 0.18);
      --text: #f7f7f7;
      --muted: #a7a7b3;
      --radius-lg: 18px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 25px rgba(245, 179, 1, 0.35);
    }

    body {
      font-family: "Cairo", system-ui, sans-serif;
      background: radial-gradient(circle at top, #1b1f2b 0, #05060a 55%, #020308 100%);
      color: var(--text);
      padding: 32px 18px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1200px;
    }

    /* HEADER */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 0, #ffe9a6 0, #f5b301 35%, #b87a00 100%);
      box-shadow: var(--shadow-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #1b1300;
      font-size: 20px;
    }

    .brand-text h1 {
      font-size: 22px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(245, 179, 1, 0.55);
    }

    .brand-text p {
      font-size: 13px;
      color: var(--muted);
    }

    .search-box input {
      background: rgba(10, 12, 20, 0.95);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 9px 14px;
      color: var(--text);
      min-width: 210px;
      outline: none;
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      background: rgba(10, 12, 20, 0.9);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow-soft);
    }

    .card-image {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.72);
      color: var(--accent);
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
    }

    .card-body {
      padding: 14px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-description {
      font-size: 13px;
      color: #c5c5d2;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f5b301, #ffdd7a);
      padding: 7px 13px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #1b1300;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <div class="brand-logo">طبخ</div>
        <div class="brand-text">
          <h1>وصفات مميزة</h1>
          <p>مجموعة مختارة من أشهى الأطباق.</p>
        </div>
      </div>

      <div class="header-actions">
        <div class="search-box">
          <input type="text" placeholder="ابحث عن وصفة أو مكوّن..." />
        </div>

        <div class="filter-chips">
          <button class="chip active">الكل</button>
          <button class="chip">سريع</button>
          <button class="chip">مقبلات</button>
          <button class="chip">أطباق رئيسية</button>
          <button class="chip">حلويات</button>
        </div>
      </div>
    </header>

    <!-- GRID -->
    <main class="grid">

      <!-- CARD 1 -->
      <article class="card">
        <img class="card-image" src="https://images.pexels.com/photos/1437267/pexels-photo-1437267.jpeg?auto=compress&cs=tinysrgb&w=800" alt="باستا بالدجاج" />
        <div class="card-body">
          <h2 class="card-title">باستا كريمية بالدجاج</h2>
          <p class="card-description">
            باستا لذيذة بصلصة كريمية مع الثوم والبارميزان، جاهزة خلال أقل من 30 دقيقة.
          </p>
          <button class="btn-primary">عرض الوصفة</button>
        </div>
      </article>

      <!-- CARD 2 -->
      <article class="card">
        <img class="card-image" src="https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg?auto=compress&cs=tinysrgb&w=800" alt="سلطة متوسطية" />
        <div class="card-body">
          <h2 class="card-title">سلطة متوسطية</h2>
          <p class="card-description">
            طماطم، خيار، زيتون، جبنة فيتا مع صلصة ليمون منعشة.
          </p>
          <button class="btn-primary">عرض الوصفة</button>
        </div>
      </article>

      <!-- CARD 3 -->
      <article class="card">
        <img class="card-image" src="https://images.pexels.com/photos/4109992/pexels-photo-4109992.jpeg?auto=compress&cs=tinysrgb&w=800" alt="فوندان الشوكولاتة" />
        <div class="card-body">
          <h2 class="card-title">فوندان الشوكولاتة</h2>
          <p class="card-description">
            حلوى شهية بقلب شوكولاتة سائل وقشرة مقرمشة لعشاق النكهة القوية.
          </p>
          <button class="btn-primary">عرض الوصفة</button>
        </div>
      </article>

    </main>
  </div>
</body>
</html>
