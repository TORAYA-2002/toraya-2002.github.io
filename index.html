<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>وصفات الطبخ</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .premium-header {
      text-align: center;
      padding: 30px 10px;
      background: #111;
      color: #fff;
    }

    .gold-title {
      font-size: 32px;
      font-weight: bold;
      color: #d4a017;
      text-shadow: 0 0 10px rgba(212,160,23,0.4);
      margin: 0 0 10px;
    }

    .gold-desc {
      font-size: 18px;
      color: #ddd;
      margin: 0;
    }

    .recipe-box {
      background: #fff;
      padding: 20px;
      margin: 25px auto;
      border-radius: 12px;
      max-width: 800px;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
      direction: rtl;
      text-align: right;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #d4a017;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin: 8px 0 4px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .btn-primary {
      background: #d4a017;
      color: #fff;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary:hover {
      background: #b88a12;
    }

    .recipe-card {
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 1px solid #eee;
    }

    .recipe-id {
      font-size: 13px;
      color: #999;
      margin-bottom: 5px;
    }

    .recipe-name {
      margin: 0 0 8px;
      font-size: 20px;
      color: #333;
    }

    .recipe-section-title {
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 4px;
      color: #444;
    }
  </style>
</head>
<body>

  <header class="premium-header">
    <h1 class="gold-title">✦ وصفات طبخ مميزة ✦</h1>
    <p class="gold-desc">
      أضف وصفاتك الخاصة، تُحفظ محليًا في جهازك مع رقم تعريفي ID لكل وصفة.
    </p>
  </header>

  <!-- إضافة وصفة جديدة -->
  <section id="recipe-writer" class="recipe-box">
    <h2 class="title">إضافة وصفة جديدة</h2>

    <label for="r-name">اسم الوصفة</label>
    <input type="text" id="r-name" placeholder="مثال: باستا كريمية بالدجاج">

    <label for="r-ingredients">المكونات</label>
    <textarea id="r-ingredients" placeholder="اكتب المكونات هنا..."></textarea>

    <label for="r-steps">طريقة التحضير</label>
    <textarea id="r-steps" placeholder="اكتب خطوات التحضير هنا..."></textarea>

    <button id="btn-save" class="btn-primary">حفظ الوصفة</button>
  </section>

  <!-- عرض الوصفات من قاعدة البيانات -->
  <section id="recipe-list" class="recipe-box">
    <h2 class="title">الوصفات المحفوظة (قاعدة البيانات)</h2>
    <div id="recipes-container"></div>
  </section>

  <script>
    // تحميل البيانات من LocalStorage
    let recipes = JSON.parse(localStorage.getItem("recipes_db") || "[]");

    function saveRecipe() {
      const name = document.getElementById("r-name").value.trim();
      const ing = document.getElementById("r-ingredients").value.trim();
      const steps = document.getElementById("r-steps").value.trim();

      if (!name || !ing || !steps) {
        alert("الرجاء ملء جميع الحقول.");
        return;
      }

      const recipe = {
        id: Date.now(), // ID تلقائي
        name,
        ing,
        steps
      };

      recipes.push(recipe);
      localStorage.setItem("recipes_db", JSON.stringify(recipes));
      clearForm();
      renderRecipes();
    }

    function clearForm() {
      document.getElementById("r-name").value = "";
      document.getElementById("r-ingredients").value = "";
      document.getElementById("r-steps").value = "";
    }

    function renderRecipes() {
      const container = document.getElementById("recipes-container");
      container.innerHTML = "";

      if (recipes.length === 0) {
        container.innerHTML = "<p>لا توجد وصفات محفوظة بعد.</p>";
        return;
      }

      recipes.forEach(r => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        card.innerHTML = `
          <div class="recipe-id">ID: ${r.id}</div>
          <h3 class="recipe-name">${r.name}</h3>
          <div>
            <div class="recipe-section-title">المكونات:</div>
            <div>${r.ing.replace(/\n/g, "<br>")}</div>
          </div>
          <div>
            <div class="recipe-section-title">طريقة التحضير:</div>
            <div>${r.steps.replace(/\n/g, "<br>")}</div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    document.getElementById("btn-save").addEventListener("click", saveRecipe);
    renderRecipes();
  </script>

</body>
</html>
