<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUM YARD – وثيقة احترافية كاملة</title>

<style>
/* ------------------------------
   تصميم قسم الوصفات
--------------------------------*/
#recipesContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.recipe-card {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.recipe-card img {
  width: 100%;
  border-radius: 10px;
}

/* ------------------------------
   أزرار الفلترة
--------------------------------*/
.filter-btn {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #eee;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

.filter-btn.active,
.filter-btn:hover {
  background: gold;
  color: #000;
}

/* ------------------------------
   قسم الفيديو
--------------------------------*/
.video-card {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
}

.video-thumbnail {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
}

.video-thumbnail img {
  width: 100%;
}

.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255, 215, 0, 0.9);
  border: none;
  font-size: 40px;
  padding: 15px 25px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.play-btn:hover {
  background: gold;
  transform: translate(-50%, -50%) scale(1.1);
}

/* ------------------------------
   نافذة الفيديو
--------------------------------*/
.video-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.video-content {
  width: 90%;
  max-width: 800px;
  position: relative;
}

.close-video {
  position: absolute;
  top: -40px;
  right: 0;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

#videoFrame {
  width: 100%;
  height: 450px;
  border-radius: 12px;
}
</style>
</head>

<body>

<!-- ============================
     قسم الوصفات
============================= -->
<section>
  <h2>الوصفات</h2>

  <div>
    <button class="filter-btn active" data-category="all">الكل</button>
    <button class="filter-btn" data-category="طاجين">طاجين</button>
    <button class="filter-btn" data-category="كسكس">كسكس</button>
    <button class="filter-btn" data-category="شوربة">شوربة</button>
    <button class="filter-btn" data-category="حلويات">حلويات</button>
  </div>

  <div id="recipesContainer"></div>
</section>

<!-- ============================
     قسم الفيديو
============================= -->
<section>
  <h2>فيديوهات الطبخ</h2>

  <div class="video-card">
    <div class="video-thumbnail">
      <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg">
      <button class="play-btn" data-video="https://www.youtube.com/embed/dQw4w9WgXcQ">▶</button>
    </div>
    <h3>عنوان الفيديو</h3>
  </div>

  <div id="videoModal" class="video-modal">
    <div class="video-content">
      <span class="close-video">&times;</span>
      <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>
</section>

<script>
/* ============================================================
   1) تحميل الوصفات
============================================================ */
let allRecipes = JSON.parse(localStorage.getItem("recipes")) || [];

/* ============================================================
   2) عرض الوصفات
============================================================ */
function renderRecipes(list) {
  const container = document.getElementById("recipesContainer");

  if (!list || list.length === 0) {
    container.innerHTML = "<p>لا توجد وصفات حالياً.</p>";
    return;
  }

  container.innerHTML = list.map(r => `
    <div class="recipe-card">
      <img src="${r.thumb}">
      <h3>${r.title}</h3>
      <p>${r.desc}</p>
    </div>
  `).join("");
}

renderRecipes(allRecipes);

/* ============================================================
   3) فلترة الوصفات
============================================================ */
const filterButtons = document.querySelectorAll(".filter-btn");

filterButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    filterButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const category = btn.dataset.category;

    if (category === "all") {
      renderRecipes(allRecipes);
    } else {
      const filtered = allRecipes.filter(r => r.category === category);
      renderRecipes(filtered);
    }
  });
});

/* ============================================================
   4) تشغيل الفيديو
============================================================ */
const playButtons = document.querySelectorAll(".play-btn");
const videoModal = document.getElementById("videoModal");
const videoFrame = document.getElementById("videoFrame");
const closeVideo = document.querySelector(".close-video");

playButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    videoFrame.src = btn.dataset.video + "?autoplay=1";
    videoModal.style.display = "flex";
  });
});

closeVideo.addEventListener("click", () => {
  videoModal.style.display = "none";
  videoFrame.src = "";
});
</script>

</body>
</html>
