<script>
// ===============================
// 1) توليد ID ثابت لكل وصفة
// ===============================
function generateRecipeId(existingRecipes) {
  const count = existingRecipes ? Object.keys(existingRecipes).length : 0;
  return "recipe_" + (count + 1);
}

// ===============================
// 2) حفظ وصفة جديدة مع ID ثابت
// ===============================
function saveNewRecipe(recipeData) {
  const recipesRef = ref(db, "recipes");

  onValue(recipesRef, (snapshot) => {
    const data = snapshot.val();
    const newId = generateRecipeId(data);

    set(ref(db, "recipes/" + newId), recipeData);
  }, { onlyOnce: true });
}

// ===============================
// 3) عرض الوصفات مع رقم N1 – N2 – N3
// ===============================
function renderRecipesWithNumbers(data) {
  const container = document.querySelector(".recipes-container");
  if (!container) return;

  container.innerHTML = "";

  Object.keys(data).forEach((id, index) => {
    const recipe = data[id];
    const number = index + 1;

    const card = document.createElement("div");
    card.className = "recipe-card";

    card.innerHTML = `
      <div class="recipe-number">N${number}</div>
      <h3>${recipe.title || "بدون عنوان"}</h3>
      <p>${recipe.description || ""}</p>
      <p><strong>الوقت:</strong> ${recipe.time || ""}</p>
      <p><strong>الحصص:</strong> ${recipe.servings || ""}</p>
    `;

    container.appendChild(card);
  });
}

// ===============================
// 4) حذف الفيديوهات نهائياً
// ===============================
document.querySelectorAll(".videos-section, .videos, #videos").forEach(el => el.remove());

// ===============================
// 5) تشغيل النظام الجديد فوق الأصلي
// ===============================
const recipesRef = ref(db, "recipes");
onValue(recipesRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    renderRecipesWithNumbers(data);
  }
});
</script>
