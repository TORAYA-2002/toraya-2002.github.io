<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الطبخ الذكي | Smart Chef Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --gold: #c5a059;
            --bg: #0f1012;
            --card-bg: #1a1b1e;
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* الهيكل الأساسي المحسن */
        header { 
            padding: 20px 8%; background: rgba(15, 16, 18, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        .hero { padding: 80px 5% 40px; text-align: center; }
        .search-box { 
            max-width: 600px; margin: 30px auto; display: flex; 
            background: var(--card-bg); border-radius: 50px; padding: 5px;
            border: 1px solid #333; transition: var(--transition);
        }
        .search-box:focus-within { border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.2); }
        .search-box input { 
            flex: 1; border: none; background: transparent; color: white; 
            padding: 15px 25px; outline: none; font-family: 'Cairo'; font-size: 1rem;
        }
        .search-box button { 
            background: var(--gold); border: none; padding: 0 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* شبكة الوصفات والأنيميشن */
        .section-title { padding: 40px 8% 20px; font-size: 1.5rem; color: var(--gold); }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; padding: 0 8% 50px; 
        }

        .recipe-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            transition: var(--transition); cursor: pointer; border: 1px solid transparent;
            animation: fadeInUp 0.8s ease backwards;
        }
        .recipe-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        
        .img-wrapper { width: 100%; height: 200px; overflow: hidden; }
        .recipe-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .recipe-card:hover img { transform: scale(1.1); }

        .card-content { padding: 20px; text-align: center; }
        .card-content h3 { font-size: 1.1rem; margin-bottom: 15px; font-weight: 700; }

        /* المختبر التفاعلي */
        #lab { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; display: none; grid-template-columns: 1fr 1fr;
        }
        .lab-visual { background: #080809; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .pot-svg { width: 220px; fill: none; stroke: var(--gold); stroke-width: 2.5; }
        
        .lab-data { padding: 60px; overflow-y: auto; text-align: right; }
        .ing-chip { 
            display: inline-block; background: #25262b; padding: 10px 20px; 
            margin: 5px; border-radius: 50px; cursor: pointer; transition: 0.3s;
            border: 1px solid #333; font-size: 0.9rem;
        }
        .ing-chip.checked { background: var(--gold); color: black; font-weight: bold; border-color: var(--gold); }

        .method-box { margin-top: 30px; display: none; animation: fadeIn 1s; }
        .video-container { margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid var(--gold); }

        .close-btn { position: absolute; top: 30px; left: 30px; font-size: 2.5rem; color: var(--gold); cursor: pointer; z-index: 10; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) { #lab { grid-template-columns: 1fr; } .lab-data { padding: 30px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">SMART<span>CHEF</span></div>
        <div style="font-size: 0.8rem; opacity: 0.6;">دعم كامل للغة العربية 🇸🇦🇲🇦</div>
    </header>

    <section class="hero">
        <h1 class="animate__animated animate__fadeInDown">اكتشف وصفاتك المفضلة</h1>
        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="ابحث عن أكلة (دجاج، لحم، بسطيلة، كيك)..." onkeyup="if(event.key==='Enter') search()">
            <button onclick="search()">بحث</button>
        </div>
    </section>

    <h2 class="section-title">✨ مقترحات مختارة</h2>
    <div class="grid" id="mainGrid"></div>

    <div id="lab">
        <span class="close-btn" onclick="closeLab()">&times;</span>
        <div class="lab-visual">
            <svg class="pot-svg" viewBox="0 0 512 512"><path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/></svg>
            <h2 id="labStatus" style="margin-top: 20px; color: var(--gold);">اجمع المكونات لبدء الطبخ</h2>
        </div>
        <div class="lab-data">
            <h1 id="labTitle" style="margin-bottom: 10px; color: var(--gold);"></h1>
            <p style="color: #888; margin-bottom: 25px;">اضغط على المكونات لتحضيرها:</p>
            <div id="ingList"></div>
            
            <div class="method-box" id="methodBox">
                <h3 style="border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 5px;">طريقة التحضير:</h3>
                <p id="methodText" style="line-height: 1.8; margin: 20px 0;"></p>
                <div class="video-container" id="videoBox"></div>
            </div>
        </div>
    </div>

    <script>
        // وصفات ثابتة للبسطيلة (صور حقيقية 100%)
        const bastillaRecipes = [
            {
                strMeal: "بسطيلة الدجاج واللوز المغربية",
                strMealThumb: "https://www.wasfati.co/wp-content/uploads/2017/05/bastila.jpg",
                ingredients: ["1.5 كجم دجاج", "1 كجم بصل مفروم", "250 جرام لوز", "8 بيضات", "ورقة بسطيلة", "قرفة وزعفران"],
                strInstructions: "1. يُطهى الدجاج مع البصل والتوابل. 2. يُفتت الدجاج وتُحضر 'الدغميرة' بالبيض. 3. يُقلى اللوز ويُهشم مع السكر والقرفة. 4. نضع المكونات في الورقة وتُخبز حتى التقرمش.",
                strYoutube: "https://www.youtube.com/embed/S_8qM888M6A"
            },
            {
                strMeal: "بسطيلة السمك وفواكه البحر",
                strMealThumb: "https://i.ytimg.com/vi/m6lX6l9Z95M/maxresdefault.jpg",
                ingredients: ["سمك أبيض", "قمرون", "كلمار", "شعرية صينية", "شرمولة حارة", "جبن مبشور"],
                strInstructions: "1. تُشحر فواكه البحر مع الشرمولة والزبدة. 2. تُمزج مع الشعرية المسلوقة. 3. تُملأ الورقة وتُزين بالجبن والقمرون وتُخبز حتى الاحمرار.",
                strYoutube: "https://www.youtube.com/embed/m6lX6l9Z95M"
            }
        ];

        window.onload = () => {
            bastillaRecipes.forEach(r => renderMeal(r));
            // جلب عينات عالمية
            fetch('https://www.themealdb.com/api/json/v1/1/filter.php?c=Seafood')
                .then(res => res.json())
                .then(data => data.meals.slice(0, 4).forEach(m => {
                    fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${m.idMeal}`)
                        .then(r => r.json()).then(d => renderMeal(d.meals[0]));
                }));
        };

        async function search() {
            const query = document.getElementById('mainSearch').value;
            if(!query) return;
            document.getElementById('mainGrid').innerHTML = "";
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
            const data = await res.json();
            if(data.meals) data.meals.forEach(renderMeal);
            else alert("لم يتم العثور على الوصفة، حاول البحث بالإنجليزية مثل (Chicken)");
        }

        function renderMeal(meal) {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.style.animationDelay = Math.random() + 's';
            card.innerHTML = `
                <div class="img-wrapper"><img src="${meal.strMealThumb}" loading="lazy"></div>
                <div class="card-content">
                    <h3>${meal.strMeal}</h3>
                    <button onclick='openLab(${JSON.stringify(meal).replace(/'/g, "&apos;")})' 
                        style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 20px; border-radius:50px; cursor:pointer; font-weight:bold;">
                        عرض التفاصيل
                    </button>
                </div>
            `;
            document.getElementById('mainGrid').appendChild(card);
        }

        function openLab(meal) {
            document.getElementById('lab').style.display = 'grid';
            document.getElementById('labTitle').innerText = meal.strMeal;
            document.getElementById('methodText').innerText = meal.strInstructions;
            document.getElementById('methodBox').style.display = 'none';
            document.getElementById('labStatus').innerText = "بانتظار المكونات...";
            
            const list = document.getElementById('ingList');
            list.innerHTML = "";
            
            let ings = meal.ingredients || [];
            if(ings.length === 0) {
                for(let i=1; i<=20; i++) if(meal[`strIngredient${i}`]) ings.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
            }

            ings.forEach(ing => {
                const span = document.createElement('span');
                span.className = 'ing-chip';
                span.innerText = ing;
                span.onclick = function() {
                    this.classList.toggle('checked');
                    if(document.querySelectorAll('.ing-chip.checked').length === ings.length) {
                        document.getElementById('methodBox').style.display = 'block';
                        document.getElementById('labStatus').innerText = "التحفة جاهزة! 🔥";
                        if(meal.strYoutube) {
                            let vidId = meal.strYoutube.replace("watch?v=", "embed/");
                            document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="300" src="${vidId}" frameborder="0" allowfullscreen></iframe>`;
                        }
                    }
                };
                list.appendChild(span);
            });
        }

        function closeLab() { document.getElementById('lab').style.display = 'none'; }
    </script>
</body>
  </html>
