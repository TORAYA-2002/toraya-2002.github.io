<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | النسخة الشاملة v3</title>
    <style>
        /* التنسيق الرئيسي الاحترافي */
        :root {
            --primary: #d35400;
            --secondary: #27ae60;
            --accent: #f1c40f;
            --dark: #2c3e50;
            --light: #fdfefe;
        }

        body { font-family: 'Cairo', 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; color: var(--dark); line-height: 1.6; }
        
        header { 
            background: linear-gradient(45deg, #2c3e50, #000000); 
            color: white; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--primary);
        }

        .search-area { max-width: 850px; margin: -35px auto 30px; display: flex; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border-radius: 50px; overflow: hidden; background: white; }
        #mainSearch { flex: 1; padding: 22px 35px; border: none; outline: none; font-size: 1.2rem; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 45px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-search:hover { background: #e67e22; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px auto; flex-wrap: wrap; max-width: 1100px; }
        .tab { padding: 12px 30px; border-radius: 30px; border: 2px solid var(--primary); background: white; color: var(--primary); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active, .tab:hover { background: var(--primary); color: white; transform: scale(1.05); }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 35px; padding: 30px; max-width: 1450px; margin: 0 auto; }
        .recipe-card { background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.4s; }
        .recipe-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .vid-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .vid-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .info { padding: 30px; }
        .title { color: var(--dark); margin: 0 0 15px 0; font-size: 1.8rem; font-weight: 900; color: var(--primary); }
        
        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tag { background: #f8f9fa; color: #666; padding: 6px 15px; border-radius: 15px; font-size: 0.85rem; border: 1px solid #ddd; }

        .section-h { color: var(--secondary); font-weight: bold; margin-top: 25px; font-size: 1.1rem; border-right: 4px solid var(--secondary); padding-right: 10px; }
        ul, ol { padding-right: 25px; color: #444; margin: 10px 0; }
        li { margin-bottom: 8px; }

        #empty { text-align: center; padding: 100px; display: none; font-size: 1.5rem; color: #bdc3c7; }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .search-area { width: 92%; } }
    </style>
</head>

</header>

</div>
