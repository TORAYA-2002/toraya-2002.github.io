<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | الموسوعة العالمية للطبخ</title>
    <style>
        /* --- CSS: التنسيق الجمالي --- */
        :root {
            --primary-color: #e67e22; /* برتقالي دافئ للشهية */
            --secondary-color: #27ae60; /* أخضر للمكونات الطازجة */
            --dark-bg: #1a1a1a;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: var(--text-color);
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #000);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .search-section {
            max-width: 700px;
            margin: -25px auto 20px;
            display: flex;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 50px;
            overflow: hidden;
        }

        #recipeSearch {
            flex: 1;
            padding: 15px 25px;
            border: none;
            outline: none;
            font-size: 1.1rem;
        }

        .search-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-btn:hover { background: #d35400; }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .cat-btn.active, .cat-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            padding: 0 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .recipe-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        .video-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .recipe-content { padding: 20px; }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .type-tag {
            background: #e8f5e9;
            color: var(--secondary-color);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .recipe-title { margin: 10px 0; color: #2c3e50; font-size: 1.4rem; }

        .meta-info {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        .section-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 15px;
            display: block;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .list-items {
            margin: 8px 0;
            padding-right: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            #recipeSearch { width: 100%; }
            .recipe-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Cooking-with-TORAYA</h1>
    <p>وصفات من كل العالم.. بكل اللغات 🌍</p>
</header>

<div class="search-section">
    <input type="text" id="recipeSearch" onkeyup="searchRecipe()" placeholder="ابحث بالاسم، المكون، أو اللغة (Ar, En, Fr)...">
    <button class="search-btn">بحث</button>
</div>

<nav class="categories" id="catNav">
    <button class="cat-btn active" onclick="filterType('all')">الكل</button>
    <button class="cat-btn" onclick="filterType('فطور')">فطور</button>
    <button class="cat-btn" onclick="filterType('غداء')">غداء</button>
    <button class="cat-btn" onclick="filterType('عشاء')">عشاء</button>
    <button class="cat-btn" onclick="filterType('حلويات')">حلويات</button>
</nav>

<main class="recipe-grid" id="recipeGrid">
    </main>

<script>
    /* --- JS: قاعدة البيانات والمنطق --- */

    // قاعدة بيانات الوصفات (قابلة للتوسع بسهولة)
    const recipesData = [
        {
            names: ["باستا بصلصة الطماطم", "Tomato Pasta", "Pâtes à la sauce tomate"],
            category: "غداء",
            prepTime: "10 دقائق",
            cookTime: "20 دقيقة",
            ingredients: [
                "400 جرام مكرونة",
                "3 فصوص ثوم مفروم",
                "صلصة طماطم طازجة",
                "زيت زيتون وريحان"
            ],
            instructions: [
                "اسلق المكرونة في ماء مملح حتى تنضج.",
                "في مقلاة، سخن الزيت وضف الثوم ثم الصلصة.",
                "امزج المكرونة مع الصلصة وزينها بالريحان."
            ],
            videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ", // ضع رابط الفيديو هنا
            languages: ["arabic", "english", "french"]
        },
        {
            names: ["شكشوكة", "Shakshuka", "Chakchouka"],
            category: "فطور",
            prepTime: "5 دقائق",
            cookTime: "15 دقيقة",
            ingredients: [
                "4 بيضات",
                "بصلة مفرومة",
                "حبتان طماطم",
                "فلفل أخضر وتوابل (كمون، بابريكا)"
            ],
            instructions: [
                "قم بتشويح البصل والفلفل حتى يذبل.",
                "أضف الطماطم والتوابل واتركها تتسبك.",
                "اصنع فجوات للبيض وغطِ المقلاة حتى ينضج."
            ],
            videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            languages: ["arabic", "english", "french"]
        }
    ];

    function renderRecipes(data) {
        const grid = document.getElementById('recipeGrid');
        grid.innerHTML = data.map(recipe => `
            <article class="recipe-card">
                <div class="video-wrapper">
                    <iframe src="${recipe.videoUrl}" title="Recipe Video"></iframe>
                </div>
                <div class="recipe-content">
                    <div class="recipe-header">
                        <span class="type-tag">${recipe.category}</span>
                    </div>
                    <h2 class="recipe-title">${recipe.names[0]}</h2>
                    <div class="meta-info">
                        <span>⏱️ تحضير: ${recipe.prepTime}</span>
                        <span>🔥 طهي: ${recipe.cookTime}</span>
                    </div>
                    
                    <span class="section-title">المكونات والمقادير:</span>
                    <ul class="list-items">
                        ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                    </ul>

                    <span class="section-title">طريقة التحضير بدقة:</span>
                    <ol class="list-items">
                        ${recipe.instructions.map(step => `<li>${step}</li>`).join('')}
                    </ol>
                </div>
            </article>
        `).join('');
    }

    function searchRecipe() {
        const query = document.getElementById('recipeSearch').value.toLowerCase();
        const filtered = recipesData.filter(r => 
            r.names.some(n => n.toLowerCase().includes(query)) ||
            r.category.toLowerCase().includes(query)
        );
        renderRecipes(filtered);
    }

    function filterType(type) {
        // تحديث شكل الأزرار
        const buttons = document.querySelectorAll('.cat-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if(type === 'all') {
            renderRecipes(recipesData);
        } else {
            const filtered = recipesData.filter(r => r.category === type);
            renderRecipes(filtered);
        }
    }

    // التشغيل الأولي
    window.onload = () => renderRecipes(recipesData);
</script>

</body>
</html>
