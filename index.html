<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبخ العالم الاحترافي | Global Cuisine</title>
    <style>
        /* المتغيرات والتصميم العام */
        :root {
            --primary: #ff6b6b;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --shadow: rgba(0, 0, 0, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: background 0.5s ease;
            line-height: 1.6;
        }

        /* الهيدر والبحث */
        header {
            padding: 4rem 10%;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), #ffa502);
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: 2rem;
        }

        .search-container {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        input {
            padding: 15px 25px;
            width: 60%;
            border-radius: 30px;
            border: none;
            outline: none;
            box-shadow: 0 4px 15px var(--shadow);
            font-size: 1rem;
        }

        button.theme-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 4px 10px var(--shadow);
            z-index: 1000;
        }

        /* شبكة الوصفات */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            padding: 2rem 10%;
        }

        /* تأثيرات البطاقة */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px var(--shadow);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px var(--shadow);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-body { padding: 1.5rem; }
        
        .tag {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .recipe-btn {
            display: block;
            text-align: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .recipe-btn:hover { background: #ff4757; }

        /* Loader */
        #loader {
            display: none;
            text-align: center;
            padding: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌓 المود الليلي</button>

    <header>
        <h1>سفرة العالم في جيبك 🌎</h1>
        <p>ابحث عن أي مكون، وسنجد لك أفضل ما طُبخ به عالمياً</p>
        <div class="search-container">
            <input type="text" id="userInput" placeholder="مثلاً: دجاج، باستا، وصفة صحية...">
            <button onclick="searchRecipes()" style="padding: 10px 25px; border-radius: 30px; border: none; background: #2d3436; color: white; cursor: pointer;">بحث</button>
        </div>
    </header>

    <div id="loader">جاري طهي النتائج... 🍳</div>
    <main class="recipe-grid" id="recipeGrid"></main>

    <script>
        const API_KEY = 7ede1952b111426b90e9e7a8f07a7263 ; //  Spoonacular

        async function searchRecipes() {
            const query = document.getElementById('userInput').value;
            const grid = document.getElementById('recipeGrid');
            const loader = document.getElementById('loader');

            if(!query) return;

            grid.innerHTML = "";
            loader.style.display = "block";

            try {
                // استخدام API مع نظام المعلومات الغذائية والوصفات الكاملة
                const response = await fetch(`https://api.spoonacular.com/recipes/complexSearch?query=${query}&apiKey=${API_KEY}&addRecipeInformation=true&number=9`);
                const data = await response.json();
                
                loader.style.display = "none";
                displayResults(data.results);
            } catch (error) {
                loader.innerText = "عذراً، حدث خطأ أثناء جلب البيانات.";
                console.error(error);
            }
        }

        function displayResults(results) {
            const grid = document.getElementById('recipeGrid');
            
            if(results.length === 0) {
                grid.innerHTML = "<h3>لم نجد وصفات تطابق بحثك، جرب كلمات أخرى!</h3>";
                return;
            }

            results.forEach((recipe, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <img src="${recipe.image}" class="card-img" alt="${recipe.title}">
                    <div class="card-body">
                        <span class="tag">${recipe.dishTypes[0] || 'أكلة عالمية'}</span>
                        <h3>${recipe.title}</h3>
                        <div class="meta-info">
                            <span>⏱️ ${recipe.readyInMinutes} دقيقة</span>
                            <span>🔥 ${Math.round(recipe.healthScore)} درجة صحية</span>
                        </div>
                        <p style="font-size: 0.9rem; margin-bottom: 15px;">
                            <strong>المكونات الرئيسية:</strong> ${recipe.summary.substring(0, 100).replace(/<[^>]*>?/gm, '')}...
                        </p>
                        <a href="${recipe.sourceUrl}" target="_blank" class="recipe-btn">شاهد طريقة التحضير بالفيديو</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            if(current === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // حفظ تفضيلات المستخدم للمود
        if(localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        // عرض أطباق مقترحة عند التشغيل
        window.onload = () => {
            document.getElementById('userInput').value = "popular";
            searchRecipes();
        };
    </script>
</body>
</html>
