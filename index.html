<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الطبخ الاحترافي | Precision Cooking Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4a017;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
            --text: #e0e0e0;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; }

        header { padding: 25px 8%; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }

        .search-hero { padding: 60px 5%; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .search-box { max-width: 650px; margin: 20px auto; display: flex; background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 5px; }
        .search-box input { flex: 1; border: none; background: transparent; color: white; padding: 15px; outline: none; font-family: 'Cairo'; }
        .search-box button { background: var(--gold); border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .section-label { padding: 30px 8% 10px; color: var(--gold); font-size: 1.3rem; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 20px 8%; }

        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 220px; object-fit: cover; filter: brightness(0.8); }
        .card-body { padding: 20px; }
        .cook-time { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); color: var(--gold); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; border: 1px solid var(--gold); }

        /* المختبر التفاعلي */
        #cookingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; grid-template-columns: 1fr 1fr; overflow-y: auto; }
        .visual-side { background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-left: 1px solid #222; }
        .pot-icon { width: 250px; fill: #222; stroke: var(--gold); stroke-width: 2; transition: 0.5s; }
        
        .timer-display { font-size: 3rem; font-weight: 900; color: var(--gold); margin-bottom: 20px; font-family: monospace; }
        
        .ingredient-fly { position: absolute; top: 0; font-size: 3rem; display: none; z-index: 10; }
        .animate-drop { display: block !important; animation: dropDown 0.6s forwards; }
        @keyframes dropDown { 0% { top: 0; opacity: 1; } 100% { top: 250px; opacity: 0; } }

        .data-side { padding: 50px; text-align: right; }
        .ing-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 10px 18px; margin: 5px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .ing-btn.checked { background: var(--gold); color: black; border-color: var(--gold); font-weight: bold; }

        .recipe-details { background: #111; padding: 25px; border-radius: 15px; border-right: 4px solid var(--gold); margin-top: 30px; display: none; }
        .close-btn { position: absolute; top: 25px; left: 25px; font-size: 2rem; color: var(--gold); cursor: pointer; }

        @media (max-width: 900px) { #cookingOverlay { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">PRECISION<span>CHEF</span></div>
        <div style="font-size: 0.8rem; opacity: 0.6;">دقة المقادير • فن التحضير</div>
    </header>

    <section class="search-hero">
        <h1>مختبر الطبخ الاحترافي</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن أي وصفة عالمية أو مغربية...">
            <button onclick="searchRecipe()">بحث دقيق</button>
        </div>
    </section>

    <div class="section-label">🇲🇦 ركن البسطيلة (مقادير ومواقيت دقيقة)</div>
    <div class="grid" id="specialGrid"></div>

    <div class="section-label">🌍 وصفات عالمية مقترحة</div>
    <div class="grid" id="globalGrid"></div>

    <div id="cookingOverlay">
        <span class="close-btn" onclick="closeLab()">&times;</span>
        <div class="visual-side">
            <div class="timer-display" id="timer">00:00</div>
            <div id="flyingIng" class="ingredient-fly">🥘</div>
            <svg class="pot-icon" viewBox="0 0 512 512">
                <path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/>
            </svg>
            <h2 id="cookStatus" style="margin-top: 30px; color: var(--gold);">بانتظار إضافة المكونات</h2>
        </div>
        <div class="data-side">
            <h1 id="recipeTitle" style="color: var(--gold);"></h1>
            <p style="opacity: 0.6;">المقادير والكميات الصارمة (اضغط للإضافة):</p>
            <div id="ingList" style="margin: 20px 0;"></div>
            
            <div class="recipe-details" id="recipeDetails">
                <h3><i class="fas fa-utensils"></i> خطوات التحضير والتقديم:</h3>
                <p id="recipeMethod" style="line-height: 1.8; margin-top: 15px;"></p>
                <div id="youtubeFrame" style="margin-top: 20px; border-radius: 10px; overflow: hidden;"></div>
            </div>
        </div>
    </div>

    <script>
        // قاعدة بيانات دقيقة للبسطيلة
        const masterRecipes = [
            {
                strMeal: "بسطيلة الدجاج واللوز التقليدية",
                strMealThumb: "https://images.unsplash.com/photo-1541518763669-27fef04b14ea",
                cookTime: "90 دقيقة",
                ingredients: ["1 دجاجة (1.5 كجم)", "1 كجم بصل أبيض مفروم", "250 جرام لوز مسلوق ومقلي", "8 بيضات بلدية", "100 جرام زبدة حيوانية", "ملعقة كبيرة سمن", "باقة بقدونس", "زعفران حر، قرفة، زنجبيل"],
                method: "1. يُطهى الدجاج مع البصل والبهارات والسمن حتى ينضج تماماً. 2. يُزال الدجاج ويُفتت، ثم نترك المرق يغلي حتى يتخثر (الدغميرة). 3. يُضاف البيض للمرق مع التحريك المستمر. 4. يُهشم اللوز ويُخلط مع السكر والقرفة. 5. تُمونطاج البسطيلة بوضع طبقة الدجاج، ثم خليط البيض، ثم اللوز. 6. تُطهى في فرن متوسط (180 درجة) لمدة 45 دقيقة حتى تتقرمش.",
                youtube: "https://www.youtube.com/embed/S_8qM888M6A"
            },
            {
                strMeal: "بسطيلة السمك وفواكه البحر الحارة",
                strMealThumb: "https://images.unsplash.com/photo-1559339352-11d035aa65de",
                cookTime: "60 دقيقة",
                ingredients: ["500 جرام سمك ميرلا", "500 جرام قمرون (جمبري)", "500 جرام كلمار قطع", "250 جرام شعرية صينية", "100 جرام فطر أسود", "شرمولة (ثوم، قزبر، حامض مصير، هريسة)", "ورقة بسطيلة كبيرة"],
                method: "1. يُبخر السمك الأبيض ويُشحر القمرون والكلمار في مقلاة مع الزبدة والشرمولة. 2. تُسلق الشعرية الصينية وتُقطع وتُمزج مع باقي الشرمولة والفطر. 3. نخلط فواكه البحر مع الشعرية برفق. 4. نملأ الورقة بالخليط مع دهنها بخليط الزبدة والزيت والتحميرة (للون الذهبي). 5. تُطهى في الفرن لمدة 30-40 دقيقة وتُزين بالجبن والقمرون.",
                youtube: "https://www.youtube.com/embed/m6lX6l9Z95M"
            }
        ];

        window.onload = () => {
            const sGrid = document.getElementById('specialGrid');
            masterRecipes.forEach(r => renderCard(r, sGrid));
            for(let i=0; i<4; i++) fetchRandom();
        };

        async function fetchRandom() {
            const res = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
            const data = await res.json();
            renderCard(data.meals[0], document.getElementById('globalGrid'), true);
        }

        async function searchRecipe() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
            const data = await res.json();
            const gGrid = document.getElementById('globalGrid');
            gGrid.innerHTML = "";
            if(data.meals) data.meals.forEach(m => renderCard(m, gGrid, true));
        }

        function renderCard(meal, target, isGlobal = false) {
            const card = document.createElement('div');
            card.className = 'card animate__animated animate__fadeIn';
            const time = meal.cookTime || "45 دقيقة";
            card.innerHTML = `
                <div class="cook-time"><i class="far fa-clock"></i> ${time}</div>
                <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
                <div class="card-body">
                    <h3 style="color:var(--gold); font-size:1.1rem;">${meal.strMeal}</h3>
                    <p style="font-size:0.8rem; opacity:0.6;">انقر للتحضير الدقيق في المختبر</p>
                    <button class="ing-btn" style="width:100%; margin-top:15px; border-color:var(--gold)" onclick='openLab(${JSON.stringify(meal).replace(/'/g, "&apos;")})'>دخول المختبر</button>
                </div>
            `;
            target.appendChild(card);
        }

        function openLab(meal) {
            document.getElementById('cookingOverlay').style.display = 'grid';
            document.getElementById('recipeTitle').innerText = meal.strMeal;
            document.getElementById('recipeMethod').innerText = meal.strInstructions || meal.method;
            document.getElementById('recipeDetails').style.display = 'none';
            document.getElementById('timer').innerText = meal.cookTime || "45:00";
            
            const list = document.getElementById('ingList');
            list.innerHTML = "";

            let ings = meal.ingredients || [];
            if(ings.length === 0) {
                for(let i=1; i<=20; i++) if(meal[`strIngredient${i}`]) ings.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
            }

            ings.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = 'ing-btn';
                btn.innerText = ing;
                btn.onclick = function() {
                    if(!this.classList.contains('checked')) {
                        this.classList.add('checked');
                        triggerFly();
                        checkProgress(ings.length, meal);
                    }
                };
                list.appendChild(btn);
            });
        }

        function triggerFly() {
            const fly = document.getElementById('flyingIng');
            fly.classList.remove('animate-drop');
            void fly.offsetWidth;
            fly.classList.add('animate-drop');
        }

        function checkProgress(total, meal) {
            const checked = document.querySelectorAll('.ing-btn.checked').length;
            document.getElementById('cookStatus').innerText = `تم إضافة ${checked} من ${total} مكونات`;
            if(checked === total) {
                document.getElementById('recipeDetails').style.display = 'block';
                document.getElementById('cookStatus').innerText = "اكتملت المقادير! ابدأ الطهي الآن 🔥";
                if(meal.youtube || meal.strYoutube) {
                    const vidUrl = meal.youtube || meal.strYoutube.replace("watch?v=", "embed/");
                    document.getElementById('youtubeFrame').innerHTML = `<iframe width="100%" height="300" src="${vidUrl}" frameborder="0" allowfullscreen></iframe>`;
                }
            }
        }

        function closeLab() { document.getElementById('cookingOverlay').style.display = 'none'; }
    </script>
</body>
</html>
