<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORAYA GLOBAL CUISINE 2002</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4757;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* الهيدر والبحث */
        header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .search-box {
            display: flex;
            background: var(--glass);
            border-radius: 50px;
            padding: 12px 25px;
            max-width: 800px;
            margin: 15px auto 0;
            border: 2px solid var(--glass);
            transition: 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); }
        input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 1.1rem; text-align: right; }

        /* قسم Reels (TikTok Style) */
        .reels-wrapper {
            padding: 20px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .reel {
            min-width: 160px;
            height: 280px;
            border-radius: 20px;
            background: #000;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--glass);
            overflow: hidden;
        }

        .reel video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .reel:hover video { opacity: 1; }
        .reel span { position: absolute; bottom: 10px; right: 10px; font-size: 12px; font-weight: bold; z-index: 2; }

        /* حاوية الأكلات */
        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .recipe-card {
            background: var(--glass);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass);
        }

        .media-area {
            position: relative;
            width: 100%;
            height: 220px;
            background: #000;
            cursor: pointer;
        }

        .recipe-video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .recipe-thumb { width: 100%; height: 100%; object-fit: cover; }

        .recipe-content { padding: 20px; }
        .recipe-title { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
        
        .tag { background: var(--accent); font-size: 11px; padding: 3px 10px; border-radius: 50px; margin-left: 5px; }

        .details { font-size: 13px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; margin-top: 10px; }

        .play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; color: var(--accent); opacity: 0.9;
        }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1 style="text-align: center; font-weight: 900;">TORAYA <span style="color: var(--accent);">2002</span></h1>
        <div class="search-box">
            <input type="text" id="recipeSearch" placeholder="ابحث عن أكلة أو دولة (مغربي، إيطالي...)...">
        </div>
    </header>

    <div class="reels-wrapper" id="reelsDiv"></div>

    <main class="main-container" id="recipesGrid"></main>

    <footer>جميع الحقوق محفوظة لـ Cooking with TORAYA © 2026</footer>

    <script>
        // قاعدة بيانات الأكلات مع فيديوهات حقيقية تعمل
        const recipes = [
            {
                id: 1,
                name: "الكسكس المغربي العالمي",
                country: "المغرب 🇲🇦",
                ingredients: "سميد، سبع خضار، لحم، سمن مغربي",
                method: "تفوير الكسكس 3 مرات مع مرق اللحم والخضار المنسم.",
                vid: "https://player.vimeo.com/external/371433846.sd.mp4?s=231da6ab57f91a5c6974866ca5925048&profile_id=139",
                img: "https://images.pexels.com/photos/7194915/pexels-photo-7194915.jpeg"
            },
            {
                id: 2,
                name: "بيتزا نابولي الإيطالية",
                country: "إيطاليا 🇮🇹",
                ingredients: "طماطم، ريحان، موزاريلا، زيت زيتون",
                method: "عجينة مخمرة طويلاً مع طهي سريع في فرن حطبي.",
                vid: "https://player.vimeo.com/external/481132593.sd.mp4?s=500742512f464010b986a4225380539f208c5c7f&profile_id=139",
                img: "https://images.pexels.com/photos/1566837/pexels-photo-1566837.jpeg"
            },
            {
                id: 3,
                name: "سوشي طوكيو الفاخر",
                country: "اليابان 🇯🇵",
                ingredients: "أرز خل، سمك سلمون، نوري، واسابي",
                method: "لف الأرز بدقة مع السمك الطازج وتقديمه بارداً.",
                vid: "https://player.vimeo.com/external/449339275.sd.mp4?s=d00469b2d869273c5d6423c2a014909a80e1a179&profile_id=139",
                img: "https://images.pexels.com/photos/357756/pexels-photo-357756.jpeg"
            }
        ];

        const grid = document.getElementById('recipesGrid');
        const reels = document.getElementById('reelsDiv');

        function render(filter = "") {
            const filtered = recipes.filter(r => r.name.includes(filter) || r.country.includes(filter));
            
            grid.innerHTML = filtered.map(r => `
                <div class="recipe-card">
                    <div class="media-area" onclick="playRecipe(${r.id})">
                        <img src="${r.img}" class="recipe-thumb" id="thumb-${r.id}">
                        <video class="recipe-video" id="video-${r.id}" loop muted playsinline>
                            <source src="${r.vid}" type="video/mp4">
                        </video>
                        <div class="play-btn" id="btn-${r.id}">▶</div>
                    </div>
                    <div class="recipe-content">
                        <span class="tag">${r.country}</span>
                        <h2 class="recipe-title">${r.name}</h2>
                        <div class="details">
                            <strong>المكونات:</strong> ${r.ingredients}<br><br>
                            <strong>التحضير:</strong> ${r.method}
                        </div>
                    </div>
                </div>
            `).join('');

            reels.innerHTML = recipes.map(r => `
                <div class="reel" onclick="playRecipe(${r.id})">
                    <video loop muted playsinline poster="${r.img}">
                        <source src="${r.vid}" type="video/mp4">
                    </video>
                    <span>${r.name}</span>
                </div>
            `).join('');
        }

        function playRecipe(id) {
            const v = document.getElementById(`video-${id}`);
            const t = document.getElementById(`thumb-${id}`);
            const b = document.getElementById(`btn-${id}`);
            
            // إخفاء الصورة والزر وتشغيل الفيديو بمجرد الضغط
            if(t) t.style.display = 'none';
            if(b) b.style.display = 'none';
            if(v) {
                v.style.display = 'block';
                v.muted = false;
                v.play();
            }
        }

        // البحث الحقيقي
        document.getElementById('recipeSearch').addEventListener('input', (e) => {
            render(e.target.value);
        });

        render();
    </script>
</body>
</html>
