<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | الموسوعة العالمية الكاملة</title>
    <style>
        /* --- المتغيرات والتصميم الاحترافي --- */
        :root {
            --primary: #d35400; /* برتقالي ملكي */
            --secondary: #27ae60; /* أخضر طازج */
            --dark: #1a1a1a;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--light-bg); 
            margin: 0; 
            color: var(--dark);
            line-height: 1.6;
        }

        /* --- الهيدر الفاخر --- */
        header { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: var(--white); 
            padding: 100px 20px; 
            text-align: center;
            border-bottom: 6px solid var(--primary);
        }

        header h1 { font-size: 3.5rem; margin: 0; font-weight: 900; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); }
        header p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

        /* --- شريط البحث الذكي --- */
        .search-section { 
            max-width: 850px; 
            margin: -40px auto 40px; 
            display: flex; 
            background: var(--white);
            border-radius: 60px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 5px;
        }

        #mainSearch { 
            flex: 1; 
            padding: 20px 35px; 
            border: none; 
            outline: none; 
            font-size: 1.2rem;
            background: transparent;
        }

        .search-btn { 
            background: var(--primary); 
            color: var(--white); 
            border: none; 
            padding: 0 45px; 
            font-weight: bold; 
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .search-btn:hover { background: #e67e22; transform: scale(1.03); }

        /* --- أزرار الفلترة --- */
        .categories { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 40px; 
            flex-wrap: wrap; 
        }

        .cat-pill { 
            padding: 12px 28px; 
            border-radius: 40px; 
            border: 2px solid var(--primary); 
            background: var(--white); 
            color: var(--primary); 
            font-weight: bold; 
            cursor: pointer;
        }

        .cat-pill.active, .cat-pill:hover { 
            background: var(--primary); 
            color: var(--white); 
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.2);
        }

        /* --- شبكة عرض الوصفات --- */
        .recipe-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); 
            gap: 40px; 
            padding: 20px 40px 80px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }

        .recipe-card { 
            background: var(--white); 
            border-radius: 35px; 
            overflow: hidden; 
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }

        .recipe-card:hover { transform: translateY(-10px); }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .recipe-content { padding: 35px; }
        .type-tag { color: var(--secondary); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .recipe-title { margin: 10px 0; font-size: 1.8rem; font-weight: 900; color: var(--dark); }
        .recipe-meta { color: #888; font-size: 0.95rem; display: flex; gap: 20px; margin-bottom: 25px; }

        .sub-h { 
            color: var(--primary); 
            font-weight: bold; 
            font-size: 1.1rem;
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub-h::after { content: ""; flex: 1; height: 1px; background: #eee; }

        ul, ol { padding-right: 20px; color: #555; }
        li { margin-bottom: 10px; }

        #noResults { text-align: center; padding: 100px; display: none; font-size: 1.5rem; color: #999; }

        @media (max-width: 768px) {
            .recipe-grid { grid-template-columns: 1fr; padding: 10px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Cooking-with-TORAYA</h1>
    <p>الموسوعة الشاملة لوصفات العالم | دقة في المكونات وإتقان في التحضير</p>
</header>

<div class="search-section">
    <input type="text" id="mainSearch" oninput="executeSearch()" placeholder="ابحث بكل اللغات: Tagine, Burger, Pasta, فطور, غداء...">
    <button class="search-btn">بحث ذكي</button>
</div>

<nav class="categories">
    <button class="cat-pill active" onclick="filterBy('all', this)">🌍 الكل</button>
    <button class="cat-pill" onclick="filterBy('فطور', this)">🍳 فطور</button>
    <button class="cat-pill" onclick="filterBy('غداء', this)">🥘 غداء</button>
    <button class="cat-pill" onclick="filterBy('عشاء', this)">🥗 عشاء</button>
    <button class="cat-pill" onclick="filterBy('حلويات', this)">🍰 حلويات</button>
</nav>

<div id="noResults">🔎 نعتذر، لم نجد وصفة تطابق كلمات البحث..</div>

<main class="recipe-grid" id="recipeGrid"></main>

<script>
    // --- قاعدة بيانات الوصفات الكاملة ---
    const recipesData = [
        {
            title: "الكسكس المغربي السبعة خضار",
            searchKeys: "كسكس غداء مغربي moroccan couscous maghrib lunch",
            category: "غداء",
            prepTime: "120 دقيقة",
            servings: "6 أشخاص",
            ingredients: ["1 كغ كسكس رفيع", "لحم غنم طازج", "الخضار السبعة (جزر، قرع، لفت، باذنجان...)", "حمص منقوع، سمن، وتوابل مغربية"],
            steps: ["تحضير المرق مع اللحم والبصل والتوابل في البرمة", "تبخير الكسكس 3 مرات مع رشه بالماء والملح بدقة", "إضافة الخضار للمرق حسب سرعة نضج كل نوع", "تقديم الكسكس في القصعة التقليدية مع تسقيته بالمرق الساخن"],
            video: "https://www.youtube.com/embed/fD3G0j1F9wY"
        },
        {
            title: "بان كيك عسلي هش",
            searchKeys: "بان كيك فطور حلويات pancakes breakfast sweet hly",
            category: "فطور",
            prepTime: "20 دقيقة",
            servings: "2 أشخاص",
            ingredients: ["بيضتان وحليب طازج", "كوب دقيق أبيض فاخر", "سكر، فانيليا، وخميرة حلويات", "عسل أو شوكولاتة للتزيين"],
            steps: ["خلط المكونات السائلة أولاً ثم إضافة الدقيق تدريجياً", "تسخين مقلاة غير لاصقة وصب كمية مناسبة", "القلب فور ظهور فقاعات صغيرة على السطح", "التقديم مع العسل والفاكهة الطازجة"],
            video: "https://www.youtube.com/embed/N_p_96K9X8o"
        },
        {
            title: "باستا إيطالية بالريحان والثوم",
            searchKeys: "باستا عشاء غداء مكرونة pasta dinner lunch italian",
            category: "عشاء",
            prepTime: "25 دقيقة",
            servings: "3 أشخاص",
            ingredients: ["400غ مكرونة إيطالية", "صلصة طماطم منزلية مركزة", "ثوم مفروم، ريحان طازج، وزيت زيتون بكر", "جبنة بارميزان مبشورة"],
            steps: ["سلق المكرونة في ماء مملح وتصفيتها قبل تمام النضج بقليل", "تحضير الصلصة مع الثوم والزيت والريحان في مقلاة واسعة", "دمج المكرونة مع الصلصة الساخنة مع القليل من ماء السلق", "إضافة الجبن والريحان وتقديمها ساخنة فوراً"],
            video: "https://www.youtube.com/embed/1-SJGQ2HLp8"
        },
        {
            title: "طاجين الدجاج بالزيتون والحامض",
            searchKeys: "طاجين دجاج غداء مغربي chicken tagine morocco poulet",
            category: "غداء",
            prepTime: "60 دقيقة",
            servings: "4 أشخاص",
            ingredients: ["دجاجة مقطعة ونظيفة", "بصل مفروم، ثوم، وحامض مصير", "زيتون أخضر وزعفران حر", "زنجبيل، كركم، وزيت زيتون"],
            steps: ["تتبيل الدجاج ووضعه في الطاجين مع البصل المفروم", "إضافة زيت الزيتون والطهي على نار هادئة جداً لضمان النكهة", "إضافة الزيتون والحامض المصير في المرحلة النهائية من الطهي", "تركه ليتجمر (الدغميرة) حتى يتركز المرق ويصبح كثيفاً"],
            video: "https://www.youtube.com/embed/L1m1e_y5kOQ"
        },
        {
            title: "تيراميسو إيطالي ملكي",
            searchKeys: "تيراميسو حلويات حلى tiramisu dessert sweet italian",
            category: "حلويات",
            prepTime: "30 دقيقة",
            servings: "6 أشخاص",
            ingredients: ["بسكويت ليدي فينجر (Savoiardi)", "جبن ماسكربون كريمي", "قهوة اسبريسو قوية وباردة", "بودرة كاكاو مر للتزيين"],
            steps: ["خفق الجبن مع الكريمة والسكر حتى يتضاعف الحجم", "تغميس البسكويت في القهوة الباردة بشكل سريع جداً", "رص طبقات البسكويت والكريمة بالتناوب في قالب عميق", "التبريد في الثلاجة لـ 6 ساعات على الأقل ثم رش الكاكاو"],
            video: "https://www.youtube.com/embed/mUf_T-3o_6E"
        }
    ];

    const grid = document.getElementById('recipeGrid');
    const empty = document.getElementById('noResults');

    // دالة عرض البيانات في الصفحة
    function render(data) {
        if (data.length === 0) {
            grid.innerHTML = "";
            empty.style.display = "block";
        } else {
            empty.style.display = "none";
            grid.innerHTML = data.map(r => `
                <article class="recipe-card">
                    <div class="video-container">
                        <iframe src="${r.video}" allowfullscreen loading="lazy"></iframe>
                    </div>
                    <div class="recipe-content">
                        <span class="type-tag">🍴 ${r.category}</span>
                        <h2 class="recipe-title">${r.title}</h2>
                        <div class="recipe-meta">
                            <span>⏱️ ${r.prepTime}</span>
                            <span>👥 ${r.servings}</span>
                        </div>
                        
                        <div class="sub-h">المقادير والمكونات</div>
                        <ul>${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
                        
                        <div class="sub-h">خطوات التحضير بدقة</div>
                        <ol>${r.steps.map(step => `<li>${step}</li>`).join('')}</ol>
                    </div>
                </article>
            `).join('');
        }
    }

    // دالة البحث الذكي (متعدد اللغات)
    function executeSearch() {
        const val = document.getElementById('mainSearch').value.toLowerCase().trim();
        const filtered = recipesData.filter(r => 
            r.title.toLowerCase().includes(val) || 
            r.searchKeys.includes(val)
        );
        render(filtered);
    }

    // دالة التصفية حسب الأقسام
    function filterBy(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (cat === 'all') {
            render(recipesData);
        } else {
            const filtered = recipesData.filter(r => r.category === cat);
            render(filtered);
        }
    }

    // تشغيل الصفحة عند التحميل
    window.onload = () => render(recipesData);
</script>

</body>
</html>
