<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cooking Studio – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #f9fafb;
    }
    .shell { max-width: 900px; margin: 32px auto; padding: 0 16px 40px; }
    h1 { margin: 0 0 4px; }
    .muted { color: #9ca3af; font-size: 0.9rem; }
    .card {
      margin-top: 16px;
      background: #020617;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 16px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
    }
    .row { margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; }
    input, textarea {
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: #f9fafb;
      padding: 6px 8px;
      font-size: 0.85rem;
      outline: none;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      border-radius: 999px;
      border: none;
      padding: 7px 14px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(90deg, #f59e0b, #f97316);
      color: #111827;
    }
    .btn-ghost {
      background: rgba(15, 23, 42, 0.9);
      color: #9ca3af;
      border: 1px solid rgba(148, 163, 184, 0.5);
    }
    .status { font-size: 0.8rem; margin-top: 6px; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
    .list { margin-top: 10px; max-height: 260px; overflow: auto; display: flex; flex-direction: column; gap: 8px; }
    .item {
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.9);
      padding: 8px;
      font-size: 0.8rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
    }
    .item-title { font-weight: 600; }
    .item-meta { color: #9ca3af; font-size: 0.75rem; }
    .item-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; justify-content: center; }
    .btn-icon {
      border: none;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-icon.danger { color: #ef4444; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Cooking Studio – Admin</h1>
    <div class="muted">This page is for you only. Do not share this URL.</div>

    <div class="card" id="auth-card">
      <div class="row">
        <label for="admin-code">Admin code</label>
        <input
          type="password"
          id="admin-code"
          placeholder="Enter admin code"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>
      <button class="btn-primary" id="admin-login-btn">Unlock admin</button>
      <div class="status" id="auth-status"></div>
    </div>

    <div class="card" id="admin-card" style="display:none;">
      <h2>Recipes</h2>
      <div class="row">
        <label>Title</label>
        <input id="r-title" />
      </div>
      <div class="row">
        <label>Description</label>
        <input id="r-desc" />
      </div>
      <div class="row">
        <label>Content</label>
        <textarea id="r-content"></textarea>
      </div>
      <div class="row">
        <label>Image URL</label>
        <input id="r-image" />
      </div>
      <div class="row">
        <label>Video URL</label>
        <input id="r-video" />
      </div>
      <button class="btn-primary" id="r-save">Save recipe</button>
      <button class="btn-ghost" id="r-reset">Reset</button>
      <div class="status" id="r-status"></div>
      <div class="list" id="r-list"></div>
    </div>

    <div class="card" id="admin-articles-card" style="display:none;">
      <h2>Articles</h2>
      <div class="row">
        <label>Title</label>
        <input id="a-title" />
      </div>
      <div class="row">
        <label>Description</label>
        <input id="a-desc" />
      </div>
      <div class="row">
        <label>Content</label>
        <textarea id="a-content"></textarea>
      </div>
      <button class="btn-primary" id="a-save">Save article</button>
      <button class="btn-ghost" id="a-reset">Reset</button>
      <div class="status" id="a-status"></div>
      <div class="list" id="a-list"></div>
    </div>
  </div>

  <script>
    const API_BASE = "/api";
    let adminCode = null;
    let recipes = [];
    let articles = [];
    let editingRecipeId = null;
    let editingArticleId = null;

    const authCard = document.getElementById("auth-card");
    const adminCard = document.getElementById("admin-card");
    const adminArticlesCard = document.getElementById("admin-articles-card");
    const adminCodeInput = document.getElementById("admin-code");
    const adminLoginBtn = document.getElementById("admin-login-btn");
    const authStatus = document.getElementById("auth-status");

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    adminLoginBtn.addEventListener("click", async () => {
      const value = adminCodeInput.value.trim();
      authStatus.classList.remove("error", "success");
      if (!value) {
        authStatus.textContent = "Enter the admin code.";
        authStatus.classList.add("error");
        return;
      }
      authStatus.textContent = "Checking...";
      try {
        const res = await fetch(`${API_BASE}/auth/admin`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-code": value
          },
          body: JSON.stringify({})
        });
        if (!res.ok) {
          authStatus.textContent = "Wrong code.";
          authStatus.classList.add("error");
          return;
        }
        adminCode = value;
        authCard.style.display = "none";
        adminCard.style.display = "block";
        adminArticlesCard.style.display = "block";
        authStatus.textContent = "";
        await Promise.all([loadRecipes(), loadArticles()]);
      } catch {
        authStatus.textContent = "Error contacting server.";
        authStatus.classList.add("error");
      }
    });

    // recipes admin
    const rTitle = document.getElementById("r-title");
    const rDesc = document.getElementById("r-desc");
    const rContent = document.getElementById("r-content");
    const rImage = document.getElementById("r-image");
    const rVideo = document.getElementById("r-video");
    const rSave = document.getElementById("r-save");
    const rReset = document.getElementById("r-reset");
    const rStatus = document.getElementById("r-status");
    const rList = document.getElementById("r-list");

    function resetRecipeForm() {
      editingRecipeId = null;
      rTitle.value = "";
      rDesc.value = "";
      rContent.value = "";
      rImage.value = "";
      rVideo.value = "";
      rStatus.textContent = "";
      rStatus.classList.remove("error", "success");
      rSave.textContent = "Save recipe";
    }

    rReset.addEventListener("click", resetRecipeForm);

    rSave.addEventListener("click", async () => {
      if (!adminCode) return;
      const title = rTitle.value.trim();
      const description = rDesc.value.trim();
      const content = rContent.value.trim();
      const imageUrl = rImage.value.trim();
      const videoUrl = rVideo.value.trim();
      if (!title) {
        rStatus.textContent = "Title required.";
        rStatus.classList.add("error");
        return;
      }
      rStatus.textContent = "Saving...";
      rStatus.classList.remove("error", "success");
      try {
        const method = editingRecipeId ? "PUT" : "POST";
        const url = editingRecipeId
          ? `${API_BASE}/recipes/${encodeURIComponent(editingRecipeId)}`
          : `${API_BASE}/recipes`;
        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            "x-admin-code": adminCode
          },
          body: JSON.stringify({ title, description, content, imageUrl, videoUrl })
        });
        if (!res.ok) throw new Error("Failed");
        rStatus.textContent = editingRecipeId ? "Updated." : "Created.";
        rStatus.classList.add("success");
        resetRecipeForm();
        await loadRecipes();
      } catch {
        rStatus.textContent = "Error saving.";
        rStatus.classList.add("error");
      }
    });

    function renderAdminRecipes() {
      rList.innerHTML = "";
      if (!recipes.length) {
        const el = document.createElement("div");
        el.className = "muted";
        el.textContent = "No recipes yet.";
        rList.appendChild(el);
        return;
      }
      recipes.forEach((r) => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div>
            <div class="item-title">${escapeHtml(r.title || "Untitled")}</div>
            <div class="item-meta">${escapeHtml(r.description || "No description")}</div>
          </div>
          <div class="item-actions">
            <button class="btn-icon" data-action="edit">✏️</button>
            <button class="btn-icon danger" data-action="delete">🗑️</button>
          </div>
        `;
        el.querySelector('[data-action="edit"]').addEventListener("click", () => {
          editingRecipeId = r.id;
          rTitle.value = r.title || "";
          rDesc.value = r.description || "";
          rContent.value = r.content || "";
          rImage.value = r.imageUrl || "";
          rVideo.value = r.videoUrl || "";
          rSave.textContent = "Update recipe";
        });
        el.querySelector('[data-action="delete"]').addEventListener("click", async () => {
          if (!confirm("Delete this recipe?")) return;
          try {
            const res = await fetch(`${API_BASE}/recipes/${encodeURIComponent(r.id)}`, {
              method: "DELETE",
              headers: { "x-admin-code": adminCode }
            });
            if (!res.ok) throw new Error("Failed");
            await loadRecipes();
          } catch {
            alert("Error deleting recipe.");
          }
        });
        rList.appendChild(el);
      });
    }

    // articles admin
    const aTitle = document.getElementById("a-title");
    const aDesc = document.getElementById("a-desc");
    const aContent = document.getElementById("a-content");
    const aSave = document.getElementById("a-save");
    const aReset = document.getElementById("a-reset");
    const aStatus = document.getElementById("a-status");
    const aList = document.getElementById("a-list");

    function resetArticleForm() {
      editingArticleId = null;
      aTitle.value = "";
      aDesc.value = "";
      aContent.value = "";
      aStatus.textContent = "";
      aStatus.classList.remove("error", "success");
      aSave.textContent = "Save article";
    }

    aReset.addEventListener("click", resetArticleForm);

    aSave.addEventListener("click", async () => {
      if (!adminCode) return;
      const title = aTitle.value.trim();
      const description = aDesc.value.trim();
      const content = aContent.value.trim();
      if (!title) {
        aStatus.textContent = "Title required.";
        aStatus.classList.add("error");
        return;
      }
      aStatus.textContent = "Saving...";
      aStatus.classList.remove("error", "success");
      try {
        const method = editingArticleId ? "PUT" : "POST";
        const url = editingArticleId
          ? `${API_BASE}/articles/${encodeURIComponent(editingArticleId)}`
          : `${API_BASE}/articles`;
        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            "x-admin-code": adminCode
          },
          body: JSON.stringify({ title, description, content })
        });
        if (!res.ok) throw new Error("Failed");
        aStatus.textContent = editingArticleId ? "Updated." : "Created.";
        aStatus.classList.add("success");
        resetArticleForm();
        await loadArticles();
      } catch {
        aStatus.textContent = "Error saving.";
        aStatus.classList.add("error");
      }
    });

    function renderAdminArticles() {
      aList.innerHTML = "";
      if (!articles.length) {
        const el = document.createElement("div");
        el.className = "muted";
        el.textContent = "No articles yet.";
        aList.appendChild(el);
        return;
      }
      articles.forEach((a) => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div>
            <div class="item-title">${escapeHtml(a.title || "Untitled")}</div>
            <div class="item-meta">${escapeHtml(a.description || "No description")}</div>
          </div>
          <div class="item-actions">
            <button class="btn-icon" data-action="edit">✏️</button>
            <button class="btn-icon danger" data-action="delete">🗑️</button>
          </div>
        `;
        el.querySelector('[data-action="edit"]').addEventListener("click", () => {
          editingArticleId = a.id;
          aTitle.value = a.title || "";
          aDesc.value = a.description || "";
          aContent.value = a.content || "";
          aSave.textContent = "Update article";
        });
        el.querySelector('[data-action="delete"]').addEventListener("click", async () => {
          if (!confirm("Delete this article?")) return;
          try {
            const res = await fetch(`${API_BASE}/articles/${encodeURIComponent(a.id)}`, {
              method: "DELETE",
              headers: { "x-admin-code": adminCode }
            });
            if (!res.ok) throw new Error("Failed");
            await loadArticles();
          } catch {
            alert("Error deleting article.");
          }
        });
        aList.appendChild(el);
      });
    }

    async function loadRecipes() {
      const res = await fetch(`${API_BASE}/public/recipes`);
      recipes = await res.json();
      renderAdminRecipes();
    }

    async function loadArticles() {
      const res = await fetch(`${API_BASE}/public/articles`);
      articles = await res.json();
      renderAdminArticles();
    }
  </script>
</body>
</html>
