<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المختبر العالمي للطهي | Global Chef Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #d4a017; --bg: #050505; --card: #111111; --accent: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* الهيدر */
        header { 
            padding: 20px 8%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--gold); }

        /* البحث الاحترافي */
        .hero { padding: 60px 8%; text-align: center; background: radial-gradient(circle, #151515 0%, #050505 100%); }
        .search-area { 
            max-width: 700px; margin: 30px auto; display: flex; 
            background: var(--card); border-radius: 15px; padding: 8px; border: 1px solid #333;
        }
        .search-area input { 
            flex: 1; background: transparent; border: none; padding: 15px; 
            color: white; font-family: 'Cairo'; font-size: 1.1rem; outline: none;
        }
        .search-area button { 
            background: var(--gold); border: none; padding: 0 35px; 
            border-radius: 10px; cursor: pointer; font-weight: 900; transition: 0.3s;
        }

        /* شبكة الوصفات */
        .section-label { padding: 40px 8% 10px; color: var(--gold); font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 8% 60px; }

        .recipe-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222;
            transition: 0.4s; position: relative; animation: zoomIn 0.5s;
        }
        .recipe-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .recipe-card img { width: 100%; height: 250px; object-fit: cover; transition: 0.5s; }
        .recipe-card:hover img { transform: scale(1.1) rotate(1deg); }
        .card-info { padding: 20px; text-align: center; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--gold); color: #000; padding: 4px 12px; border-radius: 5px; font-weight: 900; font-size: 0.8rem; }

        /* المختبر التفاعلي */
        #labOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none; grid-template-columns: 1fr 1fr;
        }
        .lab-side-visual { background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #222; position: relative; }
        .pot-icon { width: 250px; fill: none; stroke: var(--gold); stroke-width: 2; transition: 0.5s; }
        .lab-side-data { padding: 50px; overflow-y: auto; text-align: right; }
        
        .ing-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 25px 0; }
        .ing-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 12px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .ing-btn.done { background: var(--gold); color: #000; font-weight: 900; border-color: var(--gold); }

        .method-view { margin-top: 40px; display: none; border-top: 2px solid var(--gold); padding-top: 30px; animation: fadeInUp 1s; }
        .video-box { margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #333; background: #000; }
        
        .close-btn { position: absolute; top: 30px; left: 30px; font-size: 2.5rem; color: var(--gold); cursor: pointer; }

        @media (max-width: 1000px) { #labOverlay { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">GLOBAL<span>CHEF</span></div>
        <div style="font-size: 0.8rem; color: #666;">محرك البحث الذكي v5.0</div>
    </header>

    <section class="hero">
        <h1 class="animate__animated animate__fadeIn">مختبر الطبخ العالمي</h1>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="ابحث عن أي أكلة (مثال: Pizza, Chicken, Pasta)...">
            <button onclick="smartSearch()">بحث ذكي</button>
        </div>
    </section>

    <div class="section-label"><i class="fas fa-star"></i> الوصفات المقترحة</div>
    <div class="grid" id="recipeGrid"></div>

    <div id="labOverlay">
        <span class="close-btn" onclick="closeLab()">&times;</span>
        <div class="lab-side-visual">
            <svg class="pot-icon" viewBox="0 0 512 512"><path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/></svg>
            <h2 id="labStatus" style="margin-top: 30px; color: var(--gold);">اجمع المقادير</h2>
        </div>
        <div class="lab-side-data">
            <h1 id="labTitle" style="color: var(--gold); font-size: 2.5rem;"></h1>
            <p style="opacity: 0.6; margin-top: 10px;">انقر على كل مكون لوضعه في القدر الملكي:</p>
            <div class="ing-list" id="ingList"></div>
            
            <div class="method-view" id="methodView">
                <h3><i class="fas fa-hat-chef"></i> طريقة التحضير الدقيقة:</h3>
                <p id="methodText" style="line-height: 2; margin: 20px 0; font-size: 1.1rem; color: #ddd;"></p>
                <div class="video-box" id="videoBox"></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://www.themealdb.com/api/json/v1/1/";

        // عند التحميل، جلب أكلات عشوائية
        window.onload = () => {
            for(let i=0; i<6; i++) {
                fetch(API + "random.php").then(r => r.json()).then(d => renderCard(d.meals[0]));
            }
        };

        async function smartSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = ""; // مسح النتائج السابقة
            
            // جلب البيانات من السيرفر العالمي
            const res = await fetch(API + `search.php?s=${query}`);
            const data = await res.json();
            
            if(data.meals) {
                data.meals.forEach(renderCard);
            } else {
                alert("لم أجد هذه الأكلة، جرب كتابتها بالإنجليزية (مثلاً: Meat بدل لحم)");
            }
        }

        function renderCard(meal) {
            const grid = document.getElementById('recipeGrid');
            const card = document.createElement('div');
            card.className = "recipe-card";
            card.innerHTML = `
                <div class="badge">${meal.strCategory}</div>
                <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
                <div class="card-info">
                    <h3>${meal.strMeal}</h3>
                    <p style="color: #666; font-size: 0.8rem; margin: 10px 0;">المنشأ: ${meal.strArea}</p>
                    <button onclick='openLab(${JSON.stringify(meal).replace(/'/g, "&apos;")})' 
                        style="background:var(--gold); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:900; width:100%;">
                        دخول المختبر
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        function openLab(meal) {
            document.getElementById('labOverlay').style.display = 'grid';
            document.getElementById('labTitle').innerText = meal.strMeal;
            document.getElementById('methodText').innerText = meal.strInstructions;
            document.getElementById('methodView').style.display = 'none';
            document.getElementById('labStatus').innerText = "بانتظار المقادير...";

            const list = document.getElementById('ingList');
            list.innerHTML = "";

            // استخراج المقادير والكميات بدقة
            let ingredients = [];
            for(let i=1; i<=20; i++) {
                if(meal[`strIngredient${i}`]) {
                    ingredients.push(`${meal[`strMeasure${i}`]} ${meal[`strIngredient${i}`]}`);
                }
            }

            ingredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = 'ing-btn';
                btn.innerText = ing;
                btn.onclick = function() {
                    this.classList.add('done');
                    checkCooking(ingredients.length, meal);
                };
                list.appendChild(btn);
            });
        }

        function checkCooking(total, meal) {
            const current = document.querySelectorAll('.ing-btn.done').length;
            if(current === total) {
                document.getElementById('labStatus').innerText = "اكتملت الطبخة! 🔥";
                document.getElementById('methodView').style.display = 'block';
                // معالجة الفيديو
                if(meal.strYoutube) {
                    const embed = meal.strYoutube.replace("watch?v=", "embed/");
                    document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="400" src="${embed}" frameborder="0" allowfullscreen></iframe>`;
                }
            } else {
                document.getElementById('labStatus').innerText = `أضفت ${current} من ${total}`;
            }
        }

        function closeLab() {
            document.getElementById('labOverlay').style.display = 'none';
            document.getElementById('videoBox').innerHTML = ""; // إيقاف الفيديو عند الإغلاق
        }
    </script>
</body>
</html>
