<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORAYA GLOBAL CUISINE 2026 | المنصة العالمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4757;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body { background-color: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* الهيدر والبحث الذكي */
        header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .search-box {
            display: flex;
            background: var(--glass);
            border-radius: 50px;
            padding: 10px 20px;
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }

        input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 1.1rem; }

        /* قسم Reels (تيك توك الذكي) */
        .reels-wrapper {
            padding: 20px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .reel {
            min-width: 160px;
            height: 280px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            scroll-snap-align: start;
            cursor: pointer;
            border: 2px solid var(--glass);
            transition: 0.4s;
        }

        .reel:hover { transform: scale(1.05); border-color: var(--accent); }

        .reel::after {
            content: "▶ LIVE";
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
        }

        /* حاوية الأكلات العالمية */
        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 30px;
        }

        .recipe-card {
            background: var(--glass);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .recipe-card:hover { transform: translateY(-10px); }

        .media-area {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
        }

        .recipe-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .recipe-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-content { padding: 25px; }

        .tag-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag { background: var(--accent); font-size: 12px; padding: 4px 12px; border-radius: 50px; }

        .recipe-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; color: var(--accent); }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.3s;
        }

        .play-overlay:hover { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }

    </style>
</head>
<body>

    <header>
        <div style="text-align: center; margin-bottom: 15px;">
            <h1 style="font-weight: 900; letter-spacing: 2px;">TORAYA <span style="color: var(--accent);">2002</span></h1>
        </div>
        <div class="search-box">
            <input type="text" id="globalSearch" placeholder="ابحث عن أكلة (مغربية، إيطالية، يابانية...) أو لغة...">
        </div>
    </header>

    <div class="reels-wrapper" id="reelsDiv">
        </div>

    <div class="main-container" id="recipesGrid">
        </div>

    <script>
        // قاعدة البيانات الكبرى (يمكنك إضافة مئات الأكلات هنا بنفس التنسيق)
        const globalKitchen = [
            {
                id: 1,
                name: "طاجين البرقوق المغربي",
                country: "المغرب 🇲🇦",
                time: "90 دقيقة",
                difficulty: "متوسط",
                ingredients: "لحم غنم، برقوق مجفف، لوز مقلي، عسل، قرفة",
                method: "طهي اللحم مع البصل والتوابل، ثم إضافة البرقوق المعسل في النهاية.",
                img: "https://source.unsplash.com/800x600/?tagine",
                vid: "vids/morocco.mp4",
                category: "تقليدي"
            },
            {
                id: 2,
                name: "سوشي السلمون الملكي",
                country: "اليابان 🇯🇵",
                time: "40 دقيقة",
                difficulty: "محترف",
                ingredients: "أرز ياباني، سلمون طازج، نوري، أفوكادو",
                method: "تحضير الأرز بخل السوشي، لفه مع المكونات بدقة وتقطيعه.",
                img: "https://source.unsplash.com/800x600/?sushi",
                vid: "vids/japan.mp4",
                category: "عصري"
            },
            {
                id: 3,
                name: "بيتزا نابوليتانا الأصيلة",
                country: "إيطاليا 🇮🇹",
                time: "15 دقيقة",
                difficulty: "سهل",
                ingredients: "دقيق 00، طماطم سان مارزانو، موزاريلا بوفالا",
                method: "عجن يدوي، تخمير 24 ساعة، طهي في فرن حطبي بحرارة عالية.",
                img: "https://source.unsplash.com/800x600/?pizza",
                vid: "vids/italy.mp4",
                category: "شعبي"
            }
        ];

        const grid = document.getElementById('recipesGrid');
        const reels = document.getElementById('reelsDiv');

        function renderApp(data) {
            // رندرة الأكلات
            grid.innerHTML = data.map(dish => `
                <div class="recipe-card">
                    <div class="media-area" onclick="startRecipe(${dish.id})">
                        <img src="${dish.img}" class="recipe-thumb" id="thumb-${dish.id}">
                        <video class="recipe-video" id="video-${dish.id}" controls>
                            <source src="${dish.vid}" type="video/mp4">
                        </video>
                        <div class="play-overlay" id="play-${dish.id}">🔘</div>
                    </div>
                    <div class="recipe-content">
                        <div class="tag-group">
                            <span class="tag">${dish.country}</span>
                            <span class="tag" style="background:#2ecc71">${dish.category}</span>
                        </div>
                        <h2 class="recipe-title">${dish.name}</h2>
                        <div class="details-grid">
                            <div>🕒 الوقت: ${dish.time}</div>
                            <div>🔥 الصعوبة: ${dish.difficulty}</div>
                            <div style="grid-column: 1 / span 2;">📝 المكونات: ${dish.ingredients}</div>
                        </div>
                        <div style="margin-top:15px; font-size:14px; opacity:0.8">
                            <strong>التحضير:</strong> ${dish.method}
                        </div>
                    </div>
                </div>
            `).join('');

            // رندرة الـ Reels
            reels.innerHTML = data.map(dish => `
                <div class="reel" style="background-image: linear-gradient(transparent, black), url('${dish.img}')">
                    <span style="position:absolute; bottom:10px; left:10px; font-size:12px; font-weight:bold;">${dish.name}</span>
                </div>
            `).join('');
        }

        // دالة تشغيل الفيديو فوراً (بلمسة ذكية)
        function startRecipe(id) {
            const video = document.getElementById(`video-${id}`);
            const thumb = document.getElementById(`thumb-${id}`);
            const playBtn = document.getElementById(`play-${id}`);

            thumb.style.display = 'none';
            playBtn.style.display = 'none';
            video.style.display = 'block';
            video.play();
        }

        // البحث الذكي (Filter)
        document.getElementById('globalSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = globalKitchen.filter(d => 
                d.name.toLowerCase().includes(val) || 
                d.country.toLowerCase().includes(val) ||
                d.ingredients.toLowerCase().includes(val)
            );
            renderApp(filtered);
        });

        // التشغيل الأول
        renderApp(globalKitchen);

    </script>
</body>
</html>
