<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبخ الأنمي التفاعلي | Cooking Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --yellow: #FFE66D;
            --dark: #2F2FA2;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4f8;
            margin: 0;
            overflow-x: hidden;
        }

        /* الهيدر واللغات */
        header {
            background: var(--dark);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .lang-switcher select {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 5px;
        }

        /* واجهة البحث */
        .hero {
            background: var(--primary);
            padding: 60px 20px;
            text-align: center;
            color: white;
            clip-path: ellipse(100% 80% at 50% 20%);
        }

        .search-container {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            max-width: 600px;
            margin: 20px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .search-container input {
            flex: 1; border: none; padding: 15px; border-radius: 50px; outline: none; font-size: 1.1rem;
        }

        .search-container button {
            background: var(--secondary);
            color: white; border: none; padding: 0 30px; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        /* شبكة النتائج */
        .container { padding: 40px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .food-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 15px rgba(0,0,0,0.05); cursor: pointer;
            transition: 0.3s; position: relative;
        }

        .food-card:hover { transform: scale(1.05); }
        .food-card img { width: 100%; height: 200px; object-fit: cover; }
        .food-card-info { padding: 15px; text-align: center; }

        /* --- واجهة الطبخ التفاعلية (المختبر) --- */
        #cookingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--yellow); z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .cooking-pot {
            position: relative; width: 300px; height: 300px;
            background: #95a5a6; border-radius: 20px 20px 100px 100px;
            border: 10px solid #7f8c8d; margin-bottom: 50px;
            overflow: hidden;
        }

        .pot-content {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: #e67e22; transition: 1s ease;
        }

        .ingredient-anim {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            font-size: 4rem; display: none; z-index: 10;
        }

        .control-panel {
            background: white; padding: 20px; border-radius: 20px;
            display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .step-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 15px; cursor: pointer; font-weight: bold;
        }

        .step-btn:disabled { background: #ccc; cursor: not-allowed; }

        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; }

        /* الأنميشن الخاص بالمكونات */
        @keyframes dropAndSplash {
            0% { top: -100px; transform: translateX(-50%) rotate(0deg); }
            50% { top: 150px; transform: translateX(-50%) rotate(180deg); }
            100% { top: 250px; opacity: 0; }
        }

        .animate-drop { animation: dropAndSplash 1s forwards; display: block !important; }

        .steam {
            position: absolute; top: -50px; left: 50%; font-size: 2rem;
            animation: steamAnim 2s infinite; opacity: 0;
        }
        @keyframes steamAnim {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🍳 مطبخ <span>الأنمي</span></div>
        <div class="lang-switcher">
            <select id="langSelect">
                <option value="ar">العربية (AR)</option>
                <option value="en">English (EN)</option>
                <option value="fr">Français (FR)</option>
                <option value="es">Español (ES)</option>
            </select>
        </div>
    </header>

    <section class="hero">
        <h1>ماذا سنطبخ اليوم بطريقة سحرية؟</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن أكلة (مثلاً: بيض، حساء، كبسة...)">
            <button onclick="smartSearch()">اكتشف</button>
        </div>
    </section>

    <div class="container">
        <div class="grid" id="recipeGrid">
            </div>
    </div>

    <div id="cookingOverlay">
        <span class="close-btn" onclick="closeCooking()">&times;</span>
        <h2 id="cookingTitle">تحضير الوجبة السحرية</h2>
        
        <div class="cooking-pot">
            <div class="steam">💨</div>
            <div class="steam" style="animation-delay: 0.5s">💨</div>
            <div id="ingredientImg" class="ingredient-anim">🥚</div>
            <div class="pot-content" id="potLiquid"></div>
        </div>

        <div class="control-panel">
            <button class="step-btn" id="step1" onclick="nextStep(1)">إضافة المكون 1</button>
            <button class="step-btn" id="step2" onclick="nextStep(2)" disabled>إضافة المكون 2</button>
            <button class="step-btn" id="step3" onclick="nextStep(3)" disabled>مزج وطهي</button>
        </div>
        <p id="cookingStatus" style="margin-top: 20px; font-weight: bold;"></p>
    </div>

    <script>
        // دالة البحث الذكي (تعطي نتائج صلة حتى لو غير مطابقة)
        async function smartSearch() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('recipeGrid');
            
            if(!query) return;

            // ترجمة بسيطة للإنجليزية لأن الـ API أجنبي
            const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${query}&langpair=ar|en`);
            const transData = await transRes.json();
            const engQuery = transData.responseData.translatedText;

            // جلب الأكلات (تأخذ الكلمات المفتاحية لتعطي صلة أوسع)
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${engQuery}`);
            const data = await res.json();

            grid.innerHTML = "";
            if(data.meals) {
                data.meals.forEach(meal => {
                    grid.innerHTML += `
                        <div class="food-card animate__animated animate__fadeInUp" onclick="startCooking('${meal.strMeal}')">
                            <img src="${meal.strMealThumb}">
                            <div class="food-card-info">
                                <h3>${meal.strMeal}</h3>
                                <p>اضغط للبدء في الطبخ التفاعلي</p>
                            </div>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = "<h3>لم نجد نتائج، جرب كلمات أبسط مثل (Soup, Egg, Rice)</h3>";
            }
        }

        // --- منطق الطبخ التفاعلي ---
        let currentStep = 1;

        function startCooking(name) {
            document.getElementById('cookingOverlay').style.display = 'flex';
            document.getElementById('cookingTitle').innerText = "تحضير: " + name;
            resetCooking();
        }

        function nextStep(step) {
            const ing = document.getElementById('ingredientImg');
            const liquid = document.getElementById('potLiquid');
            const status = document.getElementById('cookingStatus');

            if(step === 1) {
                ing.innerText = "🥚"; // مثال للبيض
                ing.classList.add('animate-drop');
                status.innerText = "تمت إضافة المكون الأول.. كسر البيض!";
                setTimeout(() => {
                    liquid.style.height = "30%";
                    document.getElementById('step2').disabled = false;
                    ing.classList.remove('animate-drop');
                }, 1000);
            } 
            else if(step === 2) {
                ing.innerText = "🧂"; // ملح وتوابل
                ing.classList.add('animate-drop');
                status.innerText = "إضافة التوابل السحرية...";
                setTimeout(() => {
                    liquid.style.height = "60%";
                    liquid.style.background = "#d35400";
                    document.getElementById('step3').disabled = false;
                    ing.classList.remove('animate-drop');
                }, 1000);
            }
            else if(step === 3) {
                status.innerText = "الآن نقوم بالمزج والطهي.. انظر للبخار!";
                document.querySelectorAll('.steam').forEach(s => s.style.opacity = "1");
                liquid.style.height = "90%";
                setTimeout(() => {
                    alert("يا سلااام! الأكلة جاهزة للتقديم 🍲");
                    closeCooking();
                }, 3000);
            }
        }

        function resetCooking() {
            currentStep = 1;
            document.getElementById('potLiquid').style.height = "0%";
            document.getElementById('step2').disabled = true;
            document.getElementById('step3').disabled = true;
            document.getElementById('cookingStatus').innerText = "ابدأ بإضافة المكونات";
            document.querySelectorAll('.steam').forEach(s => s.style.opacity = "0");
        }

        function closeCooking() {
            document.getElementById('cookingOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
