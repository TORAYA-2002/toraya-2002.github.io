<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | النسخة الاحترافية</title>
    <style>
        /* التزمنا بنفس التصميم الرئيسي مع تحسينات بسيطة للوضوح */
        :root {
            --primary: #e67e22;
            --secondary: #27ae60;
            --dark-bg: #1a1a1a;
            --light-bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-bg); margin: 0; }
        header { background: #000; color: white; padding: 40px 20px; text-align: center; }
        
        .search-section { max-width: 800px; margin: -30px auto 20px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 50px; overflow: hidden; background: white; }
        #recipeSearch { flex: 1; padding: 18px 30px; border: none; outline: none; font-size: 1.1rem; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 0 35px; font-weight: bold; }

        .categories { display: flex; justify-content: center; gap: 10px; margin: 20px; flex-wrap: wrap; }
        .cat-btn { padding: 10px 25px; border-radius: 25px; border: 2px solid var(--primary); background: white; color: var(--primary); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: white; }

        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; padding: 20px; max-width: 1300px; margin: 0 auto; }
        .recipe-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* تحسين عرض الفيديو ليكون متجاوباً */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .recipe-content { padding: 25px; }
        .recipe-title { color: #2c3e50; margin: 0 0 10px 0; font-size: 1.5rem; }
        .meta { display: flex; gap: 20px; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .section-label { color: var(--primary); font-weight: bold; margin-top: 15px; display: block; }
        ul, ol { padding-right: 20px; font-size: 0.95rem; line-height: 1.7; color: #444; }
        
        #noResults { text-align: center; padding: 50px; display: none; font-size: 1.2rem; color: #7f8c8d; }
    </style>
</head>
<body>

<header>
    <h1>Cooking-with-TORAYA</h1>
    <p>كل وصفات العالم بين يديك.. بجميع اللغات</p>
</header>

<div class="search-section">
    <input type="text" id="recipeSearch" oninput="searchHandler()" placeholder="ابحث مثلاً: كبسة، Pizza، Omelette، Petit déjeuner...">
    <button class="search-btn">بحث</button>
</div>

<div class="categories">
    <button class="cat-btn active" onclick="filterType('all', this)">الكل</button>
    <button class="cat-btn" onclick="filterType('فطور', this)">فطور</button>
    <button class="cat-btn" onclick="filterType('غداء', this)">غداء</button>
    <button class="cat-btn" onclick="filterType('عشاء', this)">عشاء</button>
    <button class="cat-btn" onclick="filterType('حلويات', this)">حلويات</button>
</div>

<div id="noResults">عذراً، لم يتم العثور على هذه الوصفة بعد.. جرب لغة أخرى!</div>

<main class="recipe-grid" id="recipeGrid"></main>

<script>
    // قاعدة بيانات حقيقية بدقة عالية
    const recipes = [
        {
            names: ["الكسكس المغربي", "Moroccan Couscous", "Couscous Marocain"],
            cat: "غداء",
            time: "120 دقيقة",
            serves: "6 أشخاص",
            ingredients: ["1 كغ كسكس", "لحم غنم أو دجاج", "7 خضار (جزر، لفت، قرع..)", "سمن وتوابل مغربية"],
            steps: ["تحضير المرق مع اللحم والخضر", "تبخير الكسكس 3 مرات مع رشه بالماء", "التسقية في قصعة خشبية"],
            video: "https://www.youtube.com/embed/fD3G0j1F9wY", // فيديو حقيقي للكسكس
            searchTags: "couscous morocco maghrib كسكس مغربي غداء"
        },
        {
            names: ["بان كيك سهل", "Easy Pancakes", "Pancakes Faciles"],
            cat: "فطور",
            time: "15 دقيقة",
            serves: "4 أشخاص",
            ingredients: ["كوب دقيق", "بيضة واحدة", "كوب حليب", "ملعقة سكر وبكينج باودر"],
            steps: ["خلط المكونات السائلة ثم الجافة", "صب الخليط في مقلاة ساخنة", "القلب عند ظهور فقاعات"],
            video: "https://www.youtube.com/embed/N_p_96K9X8o", // فيديو حقيقي للبان كيك
            searchTags: "pancake breakfast فطور حلويات بانكيك"
        },
        {
            names: ["بيتزا مارغريتا", "Pizza Margherita", "Pizza Italienne"],
            cat: "عشاء",
            time: "45 دقيقة",
            serves: "2 شخص",
            ingredients: ["عجينة بيتزا", "صلصة طماطم ايطالية", "جبن موزاريلا طازج", "ريحان وزيت زيتون"],
            steps: ["فرد العجينة بسمك رقيق", "إضافة الصلصة والجبن", "الخبز في فرن عالي الحرارة"],
            video: "https://www.youtube.com/embed/1-SJGQ2HLp8", // فيديو حقيقي للبيتزا
            searchTags: "pizza italy dinner عشاء بيتزا ايطالية"
        }
    ];

    function displayRecipes(data) {
        const grid = document.getElementById('recipeGrid');
        const noResults = document.getElementById('noResults');
        
        if (data.length === 0) {
            grid.innerHTML = "";
            noResults.style.display = "block";
            return;
        }

        noResults.style.display = "none";
        grid.innerHTML = data.map(r => `
            <div class="recipe-card">
                <div class="video-container">
                    <iframe src="${r.video}" allowfullscreen></iframe>
                </div>
                <div class="recipe-content">
                    <h2 class="recipe-title">${r.names[0]}</h2>
                    <div class="meta">
                        <span>⏱️ ${r.time}</span>
                        <span>👥 ${r.serves}</span>
                        <span>🍴 ${r.cat}</span>
                    </div>
                    
                    <span class="section-label">المقادير:</span>
                    <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                    
                    <span class="section-label">طريقة التحضير:</span>
                    <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                </div>
            </div>
        `).join('');
    }

    // محرك البحث المطور لدعم جميع اللغات
    function searchHandler() {
        const term = document.getElementById('recipeSearch').value.toLowerCase();
        const filtered = recipes.filter(r => {
            // يبحث في الأسماء بكل اللغات + التصنيف + الكلمات الدلالية
            const allNames = r.names.join(' ').toLowerCase();
            return allNames.includes(term) || r.searchTags.includes(term);
        });
        displayRecipes(filtered);
    }

    function filterType(type, btn) {
        // تحديث الأزرار
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if(type === 'all') {
            displayRecipes(recipes);
        } else {
            const filtered = recipes.filter(r => r.cat === type);
            displayRecipes(filtered);
        }
    }

    // البدء بعرض الوصفات
    window.onload = () => displayRecipes(recipes);
</script>

</body>
</html>
